<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Speech to Text - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .stt-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Browser Support Warning */
        .browser-warning {
            background: #5f3e3e;
            border: 1px solid #ff6b6b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            color: #ffb3b3;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .browser-warning i {
            font-size: 1.5rem;
            color: #ff6b6b;
        }

        .browser-warning a {
            color: #42f8f5;
            text-decoration: none;
        }

        .browser-warning a:hover {
            text-decoration: underline;
        }

        /* Status Bar */
        .status-bar {
            background: #12151a;
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 15px;
            border: 1px solid #42f8f5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #6d8ba0;
            transition: all 0.3s ease;
        }

        .status-dot.listening {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
            animation: pulse 1.5s infinite;
        }

        .status-dot.unsupported {
            background: #ff6b6b;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .status-text {
            color: white;
            font-size: 0.85rem;
        }

        .language-select {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 6px 10px;
            color: white;
            font-size: 0.75rem;
            outline: none;
            cursor: pointer;
        }

        .language-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Main Control Button */
        .control-section {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #12151a;
            border: 3px solid #42f8f5;
            color: #42f8f5;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-button:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(66, 248, 245, 0.5);
        }

        .mic-button.listening {
            background: #42f8f5;
            color: #12151a;
            animation: pulse 1.5s infinite;
        }

        .mic-button.unsupported {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .mic-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Text Display */
        .text-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
        }

        .text-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .text-title {
            color: white;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .text-title i {
            color: #42f8f5;
        }

        .text-actions {
            display: flex;
            gap: 8px;
        }

        .text-action {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 6px;
            padding: 4px 8px;
            color: #42f8f5;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .text-action:hover:not(:disabled) {
            background: #42f8f5;
            color: #12151a;
        }

        .text-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .transcript-box {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 12px;
            padding: 15px;
            min-height: 100px;
            max-height: 150px;
            overflow-y: auto;
            color: white;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .transcript-box:empty::before {
            content: 'Click the microphone and start speaking...';
            color: #6d8ba0;
            font-style: italic;
        }

        .interim-box {
            background: #1e2b37;
            border: 1px dashed #42f8f5;
            border-radius: 8px;
            padding: 10px;
            color: #b0c4de;
            font-size: 0.85rem;
            font-style: italic;
            min-height: 40px;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            color: #b0c4de;
            font-size: 0.7rem;
            margin: 8px 0;
            padding: 0 5px;
        }

        .stats-row span {
            color: #42f8f5;
            font-weight: 600;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover:not(:disabled) {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
            font-size: 0.8rem;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover:not(:disabled) {
            background: transparent;
            color: #42f8f5;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .stt-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .status-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .mic-button {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="stt-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">🎤</span> Speech to Text
            </div>
            <div class="card-badge">VOICE</div>
        </div>

        <!-- Browser Support Warning (shown only if needed) -->
        <div class="browser-warning" id="browserWarning" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <div>
                <strong>Your browser does not support speech recognition.</strong><br>
                For best results, please use <a href="https://www.google.com/chrome/" target="_blank">Chrome</a>, <a href="https://www.microsoft.com/edge" target="_blank">Edge</a>, or <a href="https://www.apple.com/safari/" target="_blank">Safari</a>.
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-info">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Checking browser support...</span>
            </div>
            <select class="language-select" id="languageSelect" disabled>
                <option value="en-US">English (US)</option>
                <option value="en-GB">English (UK)</option>
                <option value="es-ES">Spanish</option>
                <option value="fr-FR">French</option>
                <option value="de-DE">German</option>
                <option value="hi-IN">Hindi</option>
            </select>
        </div>

        <!-- Main Control Button -->
        <div class="control-section">
            <button class="mic-button" id="micButton" onclick="toggleListening()" disabled>
                <i class="fas fa-microphone"></i>
            </button>
        </div>

        <!-- Text Display -->
        <div class="text-section">
            <div class="text-header">
                <div class="text-title">
                    <i class="fas fa-comment"></i> Transcript
                </div>
                <div class="text-actions">
                    <span class="text-action" onclick="copyTranscript()" id="copyBtn" disabled>
                        <i class="fas fa-copy"></i>
                    </span>
                    <span class="text-action" onclick="clearTranscript()" id="clearBtn" disabled>
                        <i class="fas fa-eraser"></i>
                    </span>
                </div>
            </div>
            <div class="transcript-box" id="transcript"></div>
            <div class="interim-box" id="interim"></div>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div>Words: <span id="wordCount">0</span></div>
            <div>Characters: <span id="charCount">0</span></div>
            <div>Duration: <span id="duration">0:00</span></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="startListening()" id="startBtn" disabled>
                <i class="fas fa-play"></i> Start
            </button>
            <button class="action-btn" onclick="stopListening()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> Stop
            </button>
            <button class="action-btn" onclick="saveTranscript()" id="saveBtn" disabled>
                <i class="fas fa-save"></i> Save
            </button>
            <button class="action-btn" onclick="downloadTranscript()" id="downloadBtn" disabled>
                <i class="fas fa-download"></i> Download
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Speech Recognition Setup with proper browser detection
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        // Global variables
        let isListening = false;
        let finalTranscript = '';
        let startTime = null;
        let timerInterval = null;
        let isSupported = !!recognition;

        // DOM Elements
        const micButton = document.getElementById('micButton');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const transcriptBox = document.getElementById('transcript');
        const interimBox = document.getElementById('interim');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const languageSelect = document.getElementById('languageSelect');
        const wordCountSpan = document.getElementById('wordCount');
        const charCountSpan = document.getElementById('charCount');
        const durationSpan = document.getElementById('duration');
        const browserWarning = document.getElementById('browserWarning');

        // Initialize
        function init() {
            if (!isSupported) {
                // Browser doesn't support speech recognition
                browserWarning.style.display = 'flex';
                statusDot.classList.add('unsupported');
                statusText.textContent = 'Speech recognition not supported';
                micButton.classList.add('unsupported');
                micButton.disabled = true;
                languageSelect.disabled = true;
                
                // Disable all buttons
                [startBtn, stopBtn, saveBtn, downloadBtn, copyBtn, clearBtn].forEach(btn => {
                    if (btn) btn.disabled = true;
                });
                
                console.log('Speech recognition not supported in this browser');
                return;
            }

            // Browser supports speech recognition
            browserWarning.style.display = 'none';
            statusDot.classList.remove('unsupported');
            statusText.textContent = 'Ready to listen';
            micButton.disabled = false;
            languageSelect.disabled = false;
            
            // Enable buttons
            [saveBtn, downloadBtn, copyBtn, clearBtn].forEach(btn => {
                if (btn) btn.disabled = false;
            });

            // Configure recognition
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = languageSelect.value;

            // Set up event handlers
            recognition.onstart = handleStart;
            recognition.onend = handleEnd;
            recognition.onerror = handleError;
            recognition.onresult = handleResult;
        }

        // Handle start event
        function handleStart() {
            isListening = true;
            statusDot.classList.add('listening');
            statusText.textContent = 'Listening...';
            micButton.classList.add('listening');
            micButton.innerHTML = '<i class="fas fa-microphone-slash"></i>';
            startBtn.disabled = true;
            stopBtn.disabled = false;
            
            if (!startTime) {
                startTime = Date.now();
                startTimer();
            }
        }

        // Handle end event
        function handleEnd() {
            isListening = false;
            statusDot.classList.remove('listening');
            statusText.textContent = 'Ready to listen';
            micButton.classList.remove('listening');
            micButton.innerHTML = '<i class="fas fa-microphone"></i>';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // Handle error event
        function handleError(event) {
            console.error('Speech recognition error:', event.error);
            
            if (event.error === 'not-allowed') {
                statusText.textContent = 'Microphone access denied';
            } else if (event.error === 'no-speech') {
                statusText.textContent = 'No speech detected';
            } else {
                statusText.textContent = 'Error: ' + event.error;
            }
            
            stopListening();
        }

        // Handle result event
        function handleResult(event) {
            let interimTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                
                if (event.results[i].isFinal) {
                    finalTranscript += transcript + ' ';
                } else {
                    interimTranscript += transcript;
                }
            }

            // Update displays
            transcriptBox.textContent = finalTranscript;
            interimBox.textContent = interimTranscript || (isListening ? '🎤 Listening...' : '');
            
            // Auto-scroll to bottom
            transcriptBox.scrollTop = transcriptBox.scrollHeight;
            
            // Update stats
            updateStats();
        }

        // Start listening
        function startListening() {
            if (!isSupported || !recognition) return;
            
            try {
                recognition.lang = languageSelect.value;
                recognition.start();
            } catch (error) {
                console.error('Failed to start:', error);
                statusText.textContent = 'Failed to start. Try again.';
            }
        }

        // Stop listening
        function stopListening() {
            if (!isSupported || !recognition) return;
            
            try {
                recognition.stop();
            } catch (error) {
                console.error('Failed to stop:', error);
            }
        }

        // Toggle listening
        function toggleListening() {
            if (!isSupported) return;
            
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        // Copy transcript
        function copyTranscript() {
            const text = finalTranscript || transcriptBox.textContent;
            if (!text) {
                alert('Nothing to copy');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                showNotification('Transcript copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Clear transcript
        function clearTranscript() {
            if (finalTranscript && confirm('Clear all transcript?')) {
                finalTranscript = '';
                transcriptBox.textContent = '';
                interimBox.textContent = '';
                startTime = null;
                durationSpan.textContent = '0:00';
                updateStats();
            }
        }

        // Save transcript
        function saveTranscript() {
            const text = finalTranscript || transcriptBox.textContent;
            if (!text) {
                alert('Nothing to save');
                return;
            }

            localStorage.setItem('sg_last_transcript', text);
            showNotification('Transcript saved locally!');
        }

        // Download transcript
        function downloadTranscript() {
            const text = finalTranscript || transcriptBox.textContent;
            if (!text) {
                alert('Nothing to download');
                return;
            }

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `transcript_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Update statistics
        function updateStats() {
            const text = finalTranscript || transcriptBox.textContent;
            
            // Word count
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            wordCountSpan.textContent = words;
            
            // Character count
            charCountSpan.textContent = text.length;
        }

        // Start timer
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (startTime && isListening) {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    durationSpan.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // Show notification
        function showNotification(message) {
            alert(message);
        }

        // Language change handler
        languageSelect.addEventListener('change', () => {
            if (isSupported && recognition) {
                recognition.lang = languageSelect.value;
            }
        });

        // Load last saved transcript
        const saved = localStorage.getItem('sg_last_transcript');
        if (saved) {
            finalTranscript = saved;
            transcriptBox.textContent = saved;
            updateStats();
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
