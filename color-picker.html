<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Color Picker - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .picker-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Color Picker Main */
        .color-main {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .color-preview {
            flex: 0 0 80px;
            height: 80px;
            border-radius: 16px;
            border: 2px solid #42f8f5;
            background: #ff5722;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .color-input-group {
            flex: 1;
        }

        .color-label {
            color: #b0c4de;
            font-size: 0.75rem;
            margin-bottom: 5px;
            display: block;
        }

        .color-label i {
            color: #42f8f5;
            margin-right: 5px;
        }

        .color-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 12px;
            padding: 10px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .color-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        /* Color Sliders */
        .sliders-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .slider-group {
            margin-bottom: 12px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .slider-header span {
            color: #42f8f5;
            font-weight: 600;
        }

        .color-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
        }

        .color-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #42f8f5;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(66, 248, 245, 0.4);
        }

        #redSlider { background: linear-gradient(to right, #000, #ff0000); }
        #greenSlider { background: linear-gradient(to right, #000, #00ff00); }
        #blueSlider { background: linear-gradient(to right, #000, #0000ff); }

        /* Color Values Grid */
        .values-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .value-card {
            background: #12151a;
            border-radius: 12px;
            padding: 12px 5px;
            text-align: center;
            border: 1px solid #42f8f5;
        }

        .value-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        .value-number {
            color: #42f8f5;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: monospace;
        }

        /* Color History */
        .history-section {
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .history-title {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .history-title i {
            color: #42f8f5;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }

        .history-swatch {
            aspect-ratio: 1;
            border-radius: 8px;
            border: 1px solid #42f8f5;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .history-swatch:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        /* HEX/RGB Display */
        .color-display {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .color-code {
            font-family: monospace;
            font-size: 1rem;
            color: #42f8f5;
            font-weight: 600;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 6px 15px;
            color: #42f8f5;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: #42f8f5;
            color: #12151a;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 5px;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .picker-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .color-main {
                flex-direction: column;
                gap: 10px;
            }
            
            .color-preview {
                width: 100%;
                height: 60px;
            }
            
            .values-grid {
                grid-template-columns: 1fr;
            }
            
            .history-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media screen and (max-width: 350px) {
            .action-grid {
                grid-template-columns: 1fr;
            }
            
            .color-display {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="picker-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">🎨</span> Color Picker
            </div>
            <div class="card-badge">HEX</div>
        </div>

        <!-- Color Preview and Input -->
        <div class="color-main">
            <div class="color-preview" id="colorPreview" style="background-color: #ff5722;"></div>
            <div class="color-input-group">
                <label class="color-label"><i class="fas fa-eye-dropper"></i> HEX Value</label>
                <input type="text" class="color-input" id="hexInput" value="#FF5722" maxlength="7">
            </div>
        </div>

        <!-- RGB Sliders -->
        <div class="sliders-section">
            <div class="slider-group">
                <div class="slider-header">
                    <span>Red</span>
                    <span id="redValue">255</span>
                </div>
                <input type="range" class="color-slider" id="redSlider" min="0" max="255" value="255">
            </div>
            <div class="slider-group">
                <div class="slider-header">
                    <span>Green</span>
                    <span id="greenValue">87</span>
                </div>
                <input type="range" class="color-slider" id="greenSlider" min="0" max="255" value="87">
            </div>
            <div class="slider-group">
                <div class="slider-header">
                    <span>Blue</span>
                    <span id="blueValue">34</span>
                </div>
                <input type="range" class="color-slider" id="blueSlider" min="0" max="255" value="34">
            </div>
        </div>

        <!-- RGB Values -->
        <div class="values-grid">
            <div class="value-card">
                <div class="value-label">RED</div>
                <div class="value-number" id="rgbRed">255</div>
            </div>
            <div class="value-card">
                <div class="value-label">GREEN</div>
                <div class="value-number" id="rgbGreen">87</div>
            </div>
            <div class="value-card">
                <div class="value-label">BLUE</div>
                <div class="value-number" id="rgbBlue">34</div>
            </div>
        </div>

        <!-- Color Display with Copy -->
        <div class="color-display">
            <span class="color-code" id="hexDisplay">#FF5722</span>
            <button class="copy-btn" onclick="copyHex()">
                <i class="fas fa-copy"></i> Copy HEX
            </button>
        </div>

        <div class="color-display">
            <span class="color-code" id="rgbDisplay">rgb(255, 87, 34)</span>
            <button class="copy-btn" onclick="copyRgb()">
                <i class="fas fa-copy"></i> Copy RGB
            </button>
        </div>

        <!-- Color History -->
        <div class="history-section">
            <div class="history-title">
                <i class="fas fa-history"></i> Recent Colors
            </div>
            <div class="history-grid" id="colorHistory">
                <!-- History swatches will be added here -->
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn" onclick="randomColor()">
                <i class="fas fa-random"></i> Random
            </button>
            <button class="action-btn" onclick="saveToHistory()">
                <i class="fas fa-save"></i> Save
            </button>
            <button class="action-btn" onclick="resetColor()">
                <i class="fas fa-undo"></i> Reset
            </button>
            <button class="action-btn" onclick="clearHistory()">
                <i class="fas fa-trash"></i> Clear
            </button>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Get DOM elements
        const redSlider = document.getElementById('redSlider');
        const greenSlider = document.getElementById('greenSlider');
        const blueSlider = document.getElementById('blueSlider');
        const redValue = document.getElementById('redValue');
        const greenValue = document.getElementById('greenValue');
        const blueValue = document.getElementById('blueValue');
        const rgbRed = document.getElementById('rgbRed');
        const rgbGreen = document.getElementById('rgbGreen');
        const rgbBlue = document.getElementById('rgbBlue');
        const hexInput = document.getElementById('hexInput');
        const hexDisplay = document.getElementById('hexDisplay');
        const rgbDisplay = document.getElementById('rgbDisplay');
        const colorPreview = document.getElementById('colorPreview');
        const colorHistory = document.getElementById('colorHistory');

        // Color history array
        let history = ['#FF5722', '#2196F3', '#4CAF50', '#FFC107', '#9C27B0', '#FF4081', '#00BCD4', '#FF9800'];

        // Initialize
        function init() {
            updateFromSliders();
            renderHistory();
        }

        // Update from sliders
        function updateFromSliders() {
            const r = parseInt(redSlider.value);
            const g = parseInt(greenSlider.value);
            const b = parseInt(blueSlider.value);
            
            // Update displays
            redValue.textContent = r;
            greenValue.textContent = g;
            blueValue.textContent = b;
            rgbRed.textContent = r;
            rgbGreen.textContent = g;
            rgbBlue.textContent = b;
            
            // Update preview
            colorPreview.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            
            // Update HEX
            const hex = rgbToHex(r, g, b);
            hexInput.value = hex.toUpperCase();
            hexDisplay.textContent = hex.toUpperCase();
            
            // Update RGB text
            rgbDisplay.textContent = `rgb(${r}, ${g}, ${b})`;
        }

        // Update from HEX input
        function updateFromHex() {
            let hex = hexInput.value;
            
            // Add # if missing
            if (!hex.startsWith('#')) {
                hex = '#' + hex;
                hexInput.value = hex;
            }
            
            // Validate hex
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                const rgb = hexToRgb(hex);
                redSlider.value = rgb.r;
                greenSlider.value = rgb.g;
                blueSlider.value = rgb.b;
                updateFromSliders();
            }
        }

        // Update from history
        function updateFromHistory(hex) {
            hexInput.value = hex;
            const rgb = hexToRgb(hex);
            redSlider.value = rgb.r;
            greenSlider.value = rgb.g;
            blueSlider.value = rgb.b;
            updateFromSliders();
        }

        // Convert RGB to HEX
        function rgbToHex(r, g, b) {
            return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        // Convert HEX to RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        // Copy HEX to clipboard
        function copyHex() {
            const hex = hexDisplay.textContent;
            navigator.clipboard.writeText(hex).then(() => {
                alert('HEX code copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Copy RGB to clipboard
        function copyRgb() {
            const rgb = rgbDisplay.textContent;
            navigator.clipboard.writeText(rgb).then(() => {
                alert('RGB code copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Generate random color
        function randomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            
            redSlider.value = r;
            greenSlider.value = g;
            blueSlider.value = b;
            
            updateFromSliders();
        }

        // Save current color to history
        function saveToHistory() {
            const currentHex = hexDisplay.textContent;
            
            // Add to beginning of array
            history.unshift(currentHex);
            
            // Keep only first 8 colors
            if (history.length > 8) {
                history.pop();
            }
            
            renderHistory();
        }

        // Reset to default color
        function resetColor() {
            redSlider.value = 255;
            greenSlider.value = 87;
            blueSlider.value = 34;
            updateFromSliders();
        }

        // Clear history
        function clearHistory() {
            if (confirm('Clear color history?')) {
                history = ['#FF5722', '#2196F3', '#4CAF50', '#FFC107', '#9C27B0', '#FF4081', '#00BCD4', '#FF9800'];
                renderHistory();
            }
        }

        // Render history swatches
        function renderHistory() {
            colorHistory.innerHTML = '';
            history.forEach(hex => {
                const swatch = document.createElement('div');
                swatch.className = 'history-swatch';
                swatch.style.backgroundColor = hex;
                swatch.onclick = () => updateFromHistory(hex);
                colorHistory.appendChild(swatch);
            });
        }

        // Event listeners
        redSlider.addEventListener('input', updateFromSliders);
        greenSlider.addEventListener('input', updateFromSliders);
        blueSlider.addEventListener('input', updateFromSliders);
        hexInput.addEventListener('input', updateFromHex);
        hexInput.addEventListener('blur', () => {
            // Format HEX on blur
            let hex = hexInput.value.toUpperCase();
            if (!hex.startsWith('#')) {
                hex = '#' + hex;
            }
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                hexInput.value = hex;
            }
        });

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
