<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EMI Calculator - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== MASTER STYLES - MATCHING INDEX.HTML THEME ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .calculator-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ===== INPUT SECTION ===== */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-icon {
            width: 40px;
            height: 40px;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #42f8f5;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .input-group {
            flex: 1;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-label i {
            color: #42f8f5;
            font-size: 0.6rem;
        }

        .input-field {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .input-field:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        /* Slider */
        .slider-container {
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .slider {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: #1e2b37;
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #42f8f5;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(66, 248, 245, 0.4);
        }

        /* ===== RESULTS GRID ===== */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .result-card {
            background: #12151a;
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid #42f8f5;
            transition: all 0.2s ease;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.2);
        }

        .result-label {
            color: #b0c4de;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .result-value {
            color: #42f8f5;
            font-size: 1.6rem;
            font-weight: 700;
            font-family: monospace;
        }

        /* ===== SUMMARY SECTION ===== */
        .summary-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .summary-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .summary-title i {
            color: #42f8f5;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a4055;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-label {
            color: #b0c4de;
            font-size: 0.8rem;
        }

        .summary-value {
            color: #42f8f5;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* ===== ACTION BUTTONS ===== */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* ===== ADSTERRA AD ===== */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* ===== MOBILE OPTIMIZATIONS ===== */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .calculator-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .input-row {
                flex-direction: column;
                gap: 8px;
            }
            
            .input-icon {
                width: 100%;
                height: 45px;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
            
            .action-grid {
                grid-template-columns: 1fr;
            }
            
            .result-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">🏦</span> EMI Calculator
            </div>
            <div class="card-badge">LOAN</div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <!-- Loan Amount -->
            <div class="input-row">
                <div class="input-icon">₹</div>
                <div class="input-group">
                    <div class="input-label"><i class="fas fa-circle"></i> Loan Amount</div>
                    <input type="number" class="input-field" id="loanAmount" value="100000" min="0" step="1000">
                </div>
            </div>
            <div class="slider-container">
                <input type="range" class="slider" id="loanSlider" min="10000" max="10000000" value="100000" step="1000">
            </div>

            <!-- Interest Rate -->
            <div class="input-row">
                <div class="input-icon">%</div>
                <div class="input-group">
                    <div class="input-label"><i class="fas fa-circle"></i> Interest Rate (%)</div>
                    <input type="number" class="input-field" id="interestRate" value="9" min="0" max="30" step="0.1">
                </div>
            </div>
            <div class="slider-container">
                <input type="range" class="slider" id="interestSlider" min="1" max="20" value="9" step="0.1">
            </div>

            <!-- Loan Tenure -->
            <div class="input-row">
                <div class="input-icon">📅</div>
                <div class="input-group">
                    <div class="input-label"><i class="fas fa-circle"></i> Loan Tenure (Years)</div>
                    <input type="number" class="input-field" id="loanYears" value="5" min="1" max="30" step="1">
                </div>
            </div>
            <div class="slider-container">
                <input type="range" class="slider" id="yearSlider" min="1" max="30" value="5" step="1">
            </div>
        </div>

        <!-- Results Grid -->
        <div class="results-grid">
            <div class="result-card">
                <div class="result-label">Monthly EMI</div>
                <div class="result-value" id="emiAmount">₹ 2,076</div>
            </div>
            <div class="result-card">
                <div class="result-label">Total Interest</div>
                <div class="result-value" id="totalInterest">₹ 24,550</div>
            </div>
        </div>

        <!-- Loan Summary -->
        <div class="summary-section">
            <div class="summary-title"><i class="fas fa-chart-pie"></i> Loan Summary</div>
            <div class="summary-row">
                <span class="summary-label">Principal Amount</span>
                <span class="summary-value" id="principalAmount">₹ 1,00,000</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Total Payment</span>
                <span class="summary-value" id="totalPayment">₹ 1,24,550</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Tenure (Months)</span>
                <span class="summary-value" id="tenureMonths">60</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="calculateEMI()"><i class="fas fa-calculator"></i> Calculate</button>
            <button class="action-btn" onclick="resetValues()"><i class="fas fa-undo"></i> Reset</button>
            <button class="action-btn" onclick="copySummary()"><i class="fas fa-copy"></i> Copy</button>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link"><i class="fas fa-home"></i> Back to Home</a>
            <div class="footer-email">📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a></div>
            <div class="copyright">© 2026 SG Multi Tools. All rights reserved.</div>
        </div>
    </div>

    <script>
        // ===== EMI CALCULATOR FUNCTIONALITY =====
        const loanAmount = document.getElementById('loanAmount');
        const loanSlider = document.getElementById('loanSlider');
        const interestRate = document.getElementById('interestRate');
        const interestSlider = document.getElementById('interestSlider');
        const loanYears = document.getElementById('loanYears');
        const yearSlider = document.getElementById('yearSlider');
        
        const emiAmount = document.getElementById('emiAmount');
        const totalInterest = document.getElementById('totalInterest');
        const principalAmount = document.getElementById('principalAmount');
        const totalPayment = document.getElementById('totalPayment');
        const tenureMonths = document.getElementById('tenureMonths');

        function formatCurrency(amount) {
            return '₹ ' + Math.round(amount).toLocaleString('en-IN');
        }

        function calculateEMI() {
            const P = parseFloat(loanAmount.value) || 0;
            const annualRate = parseFloat(interestRate.value) || 0;
            const years = parseFloat(loanYears.value) || 0;
            
            if (P <= 0 || annualRate <= 0 || years <= 0) {
                emiAmount.textContent = '₹ 0';
                totalInterest.textContent = '₹ 0';
                principalAmount.textContent = '₹ 0';
                totalPayment.textContent = '₹ 0';
                tenureMonths.textContent = '0';
                return;
            }

            const monthlyRate = annualRate / (12 * 100);
            const months = years * 12;
            
            const emi = P * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);
            const totalPayable = emi * months;
            const totalInterestPayable = totalPayable - P;

            emiAmount.textContent = formatCurrency(emi);
            totalInterest.textContent = formatCurrency(totalInterestPayable);
            principalAmount.textContent = formatCurrency(P);
            totalPayment.textContent = formatCurrency(totalPayable);
            tenureMonths.textContent = months;

            loanSlider.value = P;
            interestSlider.value = annualRate;
            yearSlider.value = years;
        }

        function resetValues() {
            loanAmount.value = 100000;
            interestRate.value = 9;
            loanYears.value = 5;
            
            loanSlider.value = 100000;
            interestSlider.value = 9;
            yearSlider.value = 5;
            
            calculateEMI();
        }

        function copySummary() {
            const text = `EMI Calculator Results:\nLoan Amount: ${principalAmount.textContent}\nInterest Rate: ${interestRate.value}%\nTenure: ${loanYears.value} years\nMonthly EMI: ${emiAmount.textContent}\nTotal Interest: ${totalInterest.textContent}`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Summary copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        loanSlider.addEventListener('input', () => {
            loanAmount.value = loanSlider.value;
            calculateEMI();
        });

        interestSlider.addEventListener('input', () => {
            interestRate.value = interestSlider.value;
            calculateEMI();
        });

        yearSlider.addEventListener('input', () => {
            loanYears.value = yearSlider.value;
            calculateEMI();
        });

        loanAmount.addEventListener('input', () => {
            loanSlider.value = loanAmount.value;
            calculateEMI();
        });

        interestRate.addEventListener('input', () => {
            interestSlider.value = interestRate.value;
            calculateEMI();
        });

        loanYears.addEventListener('input', () => {
            yearSlider.value = loanYears.value;
            calculateEMI();
        });

        window.addEventListener('load', calculateEMI);
    </script>
</body>
</html>
