<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Note Text Saver - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .note-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Notes List */
        .notes-list {
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
            max-height: 150px;
            overflow-y: auto;
        }

        .notes-title {
            color: white;
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .notes-title i {
            color: #42f8f5;
        }

        .note-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .note-item:hover {
            background: #42f8f5;
            transform: translateX(5px);
        }

        .note-item:hover .note-name,
        .note-item:hover .note-date {
            color: #12151a;
        }

        .note-name {
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .note-date {
            color: #b0c4de;
            font-size: 0.7rem;
        }

        .empty-notes {
            color: #b0c4de;
            font-size: 0.8rem;
            text-align: center;
            padding: 15px;
            font-style: italic;
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.75rem;
            margin-bottom: 5px;
            display: block;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 5px;
        }

        .note-title-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            margin-bottom: 10px;
        }

        .note-title-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .note-content-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            resize: vertical;
            min-height: 120px;
        }

        .note-content-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .note-content-input::placeholder {
            color: #6d8ba0;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            color: #b0c4de;
            font-size: 0.7rem;
            margin-top: 8px;
            padding: 0 5px;
        }

        .stats-row span {
            color: #42f8f5;
            font-weight: 600;
        }

        /* Action Buttons Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
            font-size: 0.8rem;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* Search Section */
        .search-section {
            background: #12151a;
            border-radius: 30px;
            padding: 5px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
            display: flex;
            align-items: center;
        }

        .search-icon {
            color: #42f8f5;
            padding: 0 10px;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .search-input::placeholder {
            color: #6d8ba0;
        }

        .search-clear {
            color: #b0c4de;
            padding: 0 10px;
            cursor: pointer;
        }

        .search-clear:hover {
            color: #42f8f5;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .note-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .notes-list {
                max-height: 120px;
            }
            
            .note-content-input {
                min-height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="note-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">📝</span> Note Text Saver
            </div>
            <div class="card-badge">LOCAL</div>
        </div>

        <!-- Notes List -->
        <div class="notes-list">
            <div class="notes-title"><i class="fas fa-list"></i> Your Notes</div>
            <div id="notesContainer">
                <!-- Notes will be populated here -->
                <div class="empty-notes" id="emptyNotes">No saved notes yet. Create your first note below!</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <span class="search-icon"><i class="fas fa-search"></i></span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search notes..." onkeyup="searchNotes()">
            <span class="search-clear" onclick="clearSearch()"><i class="fas fa-times"></i></span>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-heading"></i> Note Title</label>
            <input type="text" class="note-title-input" id="noteTitle" placeholder="Enter note title...">

            <label class="input-label"><i class="fas fa-pencil-alt"></i> Note Content</label>
            <textarea class="note-content-input" id="noteContent" placeholder="Write your note here..."></textarea>

            <!-- Stats -->
            <div class="stats-row">
                <div>Words: <span id="wordCount">0</span></div>
                <div>Characters: <span id="charCount">0</span></div>
                <div>Lines: <span id="lineCount">0</span></div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="saveNote()">
                <i class="fas fa-save"></i> Save
            </button>
            <button class="action-btn" onclick="loadNote()">
                <i class="fas fa-folder-open"></i> Load
            </button>
            <button class="action-btn" onclick="deleteNote()">
                <i class="fas fa-trash"></i> Delete
            </button>
            <button class="action-btn" onclick="clearNote()">
                <i class="fas fa-eraser"></i> Clear
            </button>
            <button class="action-btn" onclick="copyNote()">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button class="action-btn" onclick="downloadNote()">
                <i class="fas fa-download"></i> Download
            </button>
            <button class="action-btn" onclick="printNote()">
                <i class="fas fa-print"></i> Print
            </button>
            <button class="action-btn" onclick="exportNotes()">
                <i class="fas fa-file-export"></i> Export
            </button>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Initialize notes array
        let notes = [];
        let currentNoteId = null;
        let searchTerm = '';

        // Load notes from localStorage on startup
        function loadNotesFromStorage() {
            const storedNotes = localStorage.getItem('sg_notes');
            if (storedNotes) {
                notes = JSON.parse(storedNotes);
            } else {
                // Add sample note for first-time users
                notes = [
                    {
                        id: generateId(),
                        title: 'Welcome Note',
                        content: 'Welcome to SG Note Saver! Your notes are saved locally in your browser.',
                        date: new Date().toISOString(),
                        modified: new Date().toISOString()
                    }
                ];
                saveNotesToStorage();
            }
            renderNotesList();
        }

        // Save notes to localStorage
        function saveNotesToStorage() {
            localStorage.setItem('sg_notes', JSON.stringify(notes));
        }

        // Generate unique ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }

        // Render notes list
        function renderNotesList() {
            const container = document.getElementById('notesContainer');
            const emptyDiv = document.getElementById('emptyNotes');
            
            // Filter notes by search term
            let filteredNotes = notes;
            if (searchTerm) {
                filteredNotes = notes.filter(note => 
                    note.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    note.content.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }

            if (filteredNotes.length === 0) {
                emptyDiv.style.display = 'block';
                emptyDiv.textContent = searchTerm ? 'No notes match your search' : 'No saved notes yet. Create your first note below!';
                container.innerHTML = '';
                container.appendChild(emptyDiv);
                return;
            }

            emptyDiv.style.display = 'none';
            container.innerHTML = '';

            filteredNotes.forEach(note => {
                const noteElement = document.createElement('div');
                noteElement.className = 'note-item';
                noteElement.onclick = () => selectNote(note.id);
                noteElement.innerHTML = `
                    <span class="note-name">${escapeHtml(note.title) || 'Untitled'}</span>
                    <span class="note-date">${formatDate(note.modified)}</span>
                `;
                container.appendChild(noteElement);
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Select note
        function selectNote(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                currentNoteId = id;
                document.getElementById('noteTitle').value = note.title || '';
                document.getElementById('noteContent').value = note.content || '';
                updateStats();
            }
        }

        // Save note
        function saveNote() {
            const title = document.getElementById('noteTitle').value.trim() || 'Untitled';
            const content = document.getElementById('noteContent').value;

            if (!content) {
                alert('Cannot save empty note');
                return;
            }

            if (currentNoteId) {
                // Update existing note
                const index = notes.findIndex(n => n.id === currentNoteId);
                if (index !== -1) {
                    notes[index] = {
                        ...notes[index],
                        title: title,
                        content: content,
                        modified: new Date().toISOString()
                    };
                }
            } else {
                // Create new note
                const newNote = {
                    id: generateId(),
                    title: title,
                    content: content,
                    date: new Date().toISOString(),
                    modified: new Date().toISOString()
                };
                notes.push(newNote);
                currentNoteId = newNote.id;
            }

            saveNotesToStorage();
            renderNotesList();
            showNotification('Note saved successfully!');
        }

        // Load selected note
        function loadNote() {
            if (!currentNoteId && notes.length > 0) {
                // If no note selected, select the first one
                selectNote(notes[0].id);
            } else if (currentNoteId) {
                const note = notes.find(n => n.id === currentNoteId);
                if (note) {
                    document.getElementById('noteTitle').value = note.title || '';
                    document.getElementById('noteContent').value = note.content || '';
                    updateStats();
                }
            } else {
                alert('No notes available');
            }
        }

        // Delete note
        function deleteNote() {
            if (!currentNoteId) {
                alert('No note selected');
                return;
            }

            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(n => n.id !== currentNoteId);
                currentNoteId = null;
                document.getElementById('noteTitle').value = '';
                document.getElementById('noteContent').value = '';
                updateStats();
                saveNotesToStorage();
                renderNotesList();
                showNotification('Note deleted successfully!');
            }
        }

        // Clear current note
        function clearNote() {
            if (document.getElementById('noteContent').value) {
                if (confirm('Clear current note? Unsaved changes will be lost.')) {
                    document.getElementById('noteTitle').value = '';
                    document.getElementById('noteContent').value = '';
                    currentNoteId = null;
                    updateStats();
                }
            }
        }

        // Copy note to clipboard
        function copyNote() {
            const content = document.getElementById('noteContent').value;
            if (!content) {
                alert('Nothing to copy');
                return;
            }

            const title = document.getElementById('noteTitle').value;
            const textToCopy = title ? `# ${title}\n\n${content}` : content;

            navigator.clipboard.writeText(textToCopy).then(() => {
                showNotification('Note copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Download note as text file
        function downloadNote() {
            const content = document.getElementById('noteContent').value;
            if (!content) {
                alert('Nothing to download');
                return;
            }

            const title = document.getElementById('noteTitle').value || 'untitled';
            const textToDownload = title ? `# ${title}\n\n${content}` : content;
            
            const blob = new Blob([textToDownload], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Print note
        function printNote() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            
            if (!content) {
                alert('Nothing to print');
                return;
            }

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                    <head>
                        <title>${title || 'Note'}</title>
                        <style>
                            body { font-family: Arial, sans-serif; padding: 40px; line-height: 1.6; }
                            h1 { color: #333; }
                            pre { white-space: pre-wrap; font-family: inherit; }
                        </style>
                    </head>
                    <body>
                        ${title ? `<h1>${escapeHtml(title)}</h1>` : ''}
                        <pre>${escapeHtml(content)}</pre>
                    </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        // Export all notes
        function exportNotes() {
            if (notes.length === 0) {
                alert('No notes to export');
                return;
            }

            const exportData = notes.map(note => ({
                title: note.title,
                content: note.content,
                created: note.date,
                modified: note.modified
            }));

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sg_notes_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Search notes
        function searchNotes() {
            searchTerm = document.getElementById('searchInput').value;
            renderNotesList();
        }

        // Clear search
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchTerm = '';
            renderNotesList();
        }

        // Update word count, character count, line count
        function updateStats() {
            const content = document.getElementById('noteContent').value;
            
            // Word count
            const words = content.trim() ? content.trim().split(/\s+/).length : 0;
            document.getElementById('wordCount').textContent = words;
            
            // Character count
            document.getElementById('charCount').textContent = content.length;
            
            // Line count
            const lines = content ? content.split('\n').length : 0;
            document.getElementById('lineCount').textContent = lines;
        }

        // Show notification
        function showNotification(message) {
            // You can implement a better notification system
            alert(message);
        }

        // Auto-update stats on input
        document.getElementById('noteContent').addEventListener('input', updateStats);

        // Initialize
        window.addEventListener('load', () => {
            loadNotesFromStorage();
            updateStats();
        });
    </script>
</body>
</html>
