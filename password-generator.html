<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Password Generator - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .password-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Password Display */
        .password-display {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
            position: relative;
        }

        .password-text {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            font-weight: 600;
            color: #42f8f5;
            word-break: break-all;
            padding-right: 40px;
            line-height: 1.4;
        }

        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 8px 12px;
            color: #42f8f5;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: scale(1.05);
        }

        /* Strength Meter */
        .strength-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #42f8f5;
        }

        .strength-label {
            color: #b0c4de;
            font-size: 0.75rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .strength-label i {
            color: #42f8f5;
        }

        .strength-bar {
            height: 8px;
            background: #1e2b37;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-text {
            text-align: right;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Options Section */
        .options-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .option-label {
            color: white;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option-label i {
            color: #42f8f5;
            width: 20px;
        }

        .option-checkbox {
            width: 18px;
            height: 18px;
            accent-color: #42f8f5;
            cursor: pointer;
        }

        /* Length Slider */
        .length-section {
            margin: 15px 0;
        }

        .length-header {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .length-header span {
            color: #42f8f5;
            font-weight: 600;
        }

        .length-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #1e2b37;
            outline: none;
            -webkit-appearance: none;
        }

        .length-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #42f8f5;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(66, 248, 245, 0.4);
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
            font-size: 0.8rem;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* Examples Grid */
        .examples-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .examples-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .examples-title i {
            color: #42f8f5;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .example-item {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 8px 3px;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Courier New', monospace;
        }

        .example-item:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .password-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .examples-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .password-text {
                font-size: 1rem;
            }
            
            .copy-btn {
                position: relative;
                top: 0;
                right: 0;
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="password-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">🔐</span> Password Generator
            </div>
            <div class="card-badge">SECURE</div>
        </div>

        <!-- Password Display -->
        <div class="password-display">
            <div class="password-text" id="passwordDisplay">P@ssw0rd123!</div>
            <button class="copy-btn" onclick="copyPassword()">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>

        <!-- Strength Meter -->
        <div class="strength-section">
            <div class="strength-label">
                <i class="fas fa-shield-alt"></i> Password Strength
            </div>
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill" style="width: 80%; background-color: #4caf50;"></div>
            </div>
            <div class="strength-text" id="strengthText">Strong</div>
        </div>

        <!-- Options Section -->
        <div class="options-section">
            <div class="option-row">
                <label class="option-label">
                    <i class="fas fa-font"></i> Uppercase (A-Z)
                </label>
                <input type="checkbox" class="option-checkbox" id="uppercase" checked>
            </div>
            <div class="option-row">
                <label class="option-label">
                    <i class="fas fa-font"></i> Lowercase (a-z)
                </label>
                <input type="checkbox" class="option-checkbox" id="lowercase" checked>
            </div>
            <div class="option-row">
                <label class="option-label">
                    <i class="fas fa-hashtag"></i> Numbers (0-9)
                </label>
                <input type="checkbox" class="option-checkbox" id="numbers" checked>
            </div>
            <div class="option-row">
                <label class="option-label">
                    <i class="fas fa-exclamation"></i> Symbols (!@#$%^&*)
                </label>
                <input type="checkbox" class="option-checkbox" id="symbols" checked>
            </div>
            <div class="option-row">
                <label class="option-label">
                    <i class="fas fa-times-circle"></i> Exclude Similar (i,l,1,L,o,0,O)
                </label>
                <input type="checkbox" class="option-checkbox" id="excludeSimilar">
            </div>
            <div class="option-row">
                <label class="option-label">
                    <i class="fas fa-ban"></i> Exclude Ambiguous ({ } [ ] ( ) / \ ' " ` ~ , ; : . < >)
                </label>
                <input type="checkbox" class="option-checkbox" id="excludeAmbiguous">
            </div>

            <!-- Length Slider -->
            <div class="length-section">
                <div class="length-header">
                    <span>Password Length</span>
                    <span id="lengthValue">12</span>
                </div>
                <input type="range" class="length-slider" id="lengthSlider" min="4" max="32" value="12" oninput="updateLength()">
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="generatePassword()">
                <i class="fas fa-sync-alt"></i> Generate
            </button>
            <button class="action-btn" onclick="copyPassword()">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button class="action-btn" onclick="regeneratePassword()">
                <i class="fas fa-redo-alt"></i> Regenerate
            </button>
            <button class="action-btn" onclick="resetOptions()">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <!-- Examples Section -->
        <div class="examples-section">
            <div class="examples-title">
                <i class="fas fa-star"></i> Quick Examples
            </div>
            <div class="examples-grid" id="examplesGrid">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Character sets
        const charSets = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        const similarChars = 'il1Lo0O';
        const ambiguousChars = '{}[]()/\\\'"`~,;:.<>';

        // Initialize
        function init() {
            renderExamples();
            generatePassword();
        }

        // Update length display
        function updateLength() {
            const length = document.getElementById('lengthSlider').value;
            document.getElementById('lengthValue').textContent = length;
        }

        // Generate password
        function generatePassword() {
            const length = parseInt(document.getElementById('lengthSlider').value);
            const useUppercase = document.getElementById('uppercase').checked;
            const useLowercase = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            const excludeSimilar = document.getElementById('excludeSimilar').checked;
            const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;

            // Build character pool
            let charPool = '';
            if (useUppercase) charPool += charSets.uppercase;
            if (useLowercase) charPool += charSets.lowercase;
            if (useNumbers) charPool += charSets.numbers;
            if (useSymbols) charPool += charSets.symbols;

            // Remove excluded characters
            if (excludeSimilar) {
                for (let char of similarChars) {
                    charPool = charPool.replace(new RegExp(char, 'g'), '');
                }
            }

            if (excludeAmbiguous) {
                for (let char of ambiguousChars) {
                    charPool = charPool.replace(new RegExp('\\' + char, 'g'), '');
                }
            }

            // Check if any character set selected
            if (charPool.length === 0) {
                alert('Please select at least one character type');
                return;
            }

            // Generate password
            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * charPool.length);
                password += charPool[randomIndex];
            }

            // Ensure at least one character from each selected type
            if (useUppercase && !/[A-Z]/.test(password)) {
                password = replaceRandomChar(password, charSets.uppercase);
            }
            if (useLowercase && !/[a-z]/.test(password)) {
                password = replaceRandomChar(password, charSets.lowercase);
            }
            if (useNumbers && !/[0-9]/.test(password)) {
                password = replaceRandomChar(password, charSets.numbers);
            }
            if (useSymbols && !/[!@#$%^&*()_+\-=[\]{}|;:,.<>?]/.test(password)) {
                password = replaceRandomChar(password, charSets.symbols);
            }

            // Display password
            document.getElementById('passwordDisplay').textContent = password;
            
            // Update strength meter
            updateStrength(password);
        }

        // Replace random character to ensure character type
        function replaceRandomChar(password, charSet) {
            const pos = Math.floor(Math.random() * password.length);
            const randomChar = charSet[Math.floor(Math.random() * charSet.length)];
            return password.substring(0, pos) + randomChar + password.substring(pos + 1);
        }

        // Regenerate password (same options)
        function regeneratePassword() {
            generatePassword();
        }

        // Copy password to clipboard
        function copyPassword() {
            const password = document.getElementById('passwordDisplay').textContent;
            navigator.clipboard.writeText(password).then(() => {
                showNotification('Password copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Reset options to default
        function resetOptions() {
            document.getElementById('uppercase').checked = true;
            document.getElementById('lowercase').checked = true;
            document.getElementById('numbers').checked = true;
            document.getElementById('symbols').checked = true;
            document.getElementById('excludeSimilar').checked = false;
            document.getElementById('excludeAmbiguous').checked = false;
            document.getElementById('lengthSlider').value = 12;
            document.getElementById('lengthValue').textContent = '12';
            generatePassword();
        }

        // Update strength meter
        function updateStrength(password) {
            let score = 0;
            
            // Length contribution
            if (password.length >= 8) score += 25;
            if (password.length >= 12) score += 15;
            if (password.length >= 16) score += 10;
            
            // Character type contribution
            if (/[a-z]/.test(password)) score += 10;
            if (/[A-Z]/.test(password)) score += 10;
            if (/[0-9]/.test(password)) score += 10;
            if (/[^a-zA-Z0-9]/.test(password)) score += 20;
            
            // Variety contribution
            const uniqueChars = new Set(password).size;
            if (uniqueChars > password.length * 0.7) score += 10;
            
            // Cap at 100
            score = Math.min(score, 100);

            // Update UI
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');

            strengthFill.style.width = score + '%';

            if (score < 30) {
                strengthFill.style.backgroundColor = '#ff4d4d';
                strengthText.textContent = 'Very Weak';
                strengthText.style.color = '#ff4d4d';
            } else if (score < 50) {
                strengthFill.style.backgroundColor = '#ffa64d';
                strengthText.textContent = 'Weak';
                strengthText.style.color = '#ffa64d';
            } else if (score < 70) {
                strengthFill.style.backgroundColor = '#ffff4d';
                strengthText.textContent = 'Medium';
                strengthText.style.color = '#ffff4d';
            } else if (score < 90) {
                strengthFill.style.backgroundColor = '#4caf50';
                strengthText.textContent = 'Strong';
                strengthText.style.color = '#4caf50';
            } else {
                strengthFill.style.backgroundColor = '#00ff00';
                strengthText.textContent = 'Very Strong';
                strengthText.style.color = '#00ff00';
            }
        }

        // Render example passwords
        function renderExamples() {
            const examples = [
                { label: 'Basic', password: 'MyP@ssw0rd' },
                { label: 'Strong', password: 'X#9kP$2mN@5q' },
                { label: 'PIN', password: '83527914' },
                { label: 'Simple', password: 'Summer2024!' }
            ];

            const container = document.getElementById('examplesGrid');
            container.innerHTML = '';

            examples.forEach(example => {
                const item = document.createElement('div');
                item.className = 'example-item';
                item.textContent = example.password;
                item.onclick = () => {
                    document.getElementById('passwordDisplay').textContent = example.password;
                    updateStrength(example.password);
                };
                container.appendChild(item);
            });
        }

        // Show notification
        function showNotification(message) {
            // You can enhance this with a toast notification
            alert(message);
        }

        // Event listeners
        document.getElementById('uppercase').addEventListener('change', generatePassword);
        document.getElementById('lowercase').addEventListener('change', generatePassword);
        document.getElementById('numbers').addEventListener('change', generatePassword);
        document.getElementById('symbols').addEventListener('change', generatePassword);
        document.getElementById('excludeSimilar').addEventListener('change', generatePassword);
        document.getElementById('excludeAmbiguous').addEventListener('change', generatePassword);
        document.getElementById('lengthSlider').addEventListener('input', generatePassword);

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
