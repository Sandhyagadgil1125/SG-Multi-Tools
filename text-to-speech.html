<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Text to Speech - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .tts-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.75rem;
            margin-bottom: 5px;
            display: block;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 5px;
        }

        .text-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 10px;
        }

        .text-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .text-input::placeholder {
            color: #6d8ba0;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            color: #b0c4de;
            font-size: 0.7rem;
            margin-top: 5px;
            padding: 0 5px;
        }

        .stats-row span {
            color: #42f8f5;
            font-weight: 600;
        }

        /* Voice Controls */
        .controls-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
        }

        .control-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 120px;
        }

        .control-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .control-label i {
            color: #42f8f5;
        }

        .voice-select {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .rate-slider, .pitch-slider {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: #1e2b37;
            outline: none;
            -webkit-appearance: none;
        }

        .rate-slider::-webkit-slider-thumb,
        .pitch-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #42f8f5;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(66, 248, 245, 0.4);
        }

        .slider-value {
            text-align: right;
            color: #42f8f5;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 3px;
        }

        /* Progress Bar */
        .progress-section {
            margin: 15px 0;
        }

        .progress-bar {
            height: 6px;
            background: #1e2b37;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #42f8f5;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: #b0c4de;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* Main Control Buttons */
        .main-controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .main-btn {
            flex: 1;
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 30px;
            padding: 12px 5px;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .main-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .main-btn i {
            margin-right: 5px;
        }

        .main-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .main-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        .main-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
            font-size: 0.8rem;
        }

        /* Quick Samples */
        .samples-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .samples-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .samples-title i {
            color: #42f8f5;
        }

        .samples-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .sample-item {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 8px 3px;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sample-item:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
        }

        .sample-item i {
            display: block;
            font-size: 1rem;
            margin-bottom: 3px;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .tts-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .control-row {
                flex-direction: column;
                gap: 10px;
            }
            
            .main-controls {
                flex-direction: column;
            }
            
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .samples-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .text-input {
                min-height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="tts-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">🔊</span> Text to Speech
            </div>
            <div class="card-badge">LISTEN</div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-pencil-alt"></i> Enter Text</label>
            <textarea class="text-input" id="textInput" placeholder="Type or paste text to speak...">Welcome to SG Multi Tools. This is a text to speech demonstration.</textarea>
            
            <!-- Stats -->
            <div class="stats-row">
                <div>Words: <span id="wordCount">9</span></div>
                <div>Characters: <span id="charCount">58</span></div>
                <div>Est. Time: <span id="estTime">~15s</span></div>
            </div>
        </div>

        <!-- Voice Controls -->
        <div class="controls-section">
            <div class="control-row">
                <div class="control-group">
                    <div class="control-label"><i class="fas fa-language"></i> Voice</div>
                    <select class="voice-select" id="voiceSelect"></select>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <div class="control-label"><i class="fas fa-tachometer-alt"></i> Speed: <span id="rateValue">1.0x</span></div>
                    <input type="range" class="rate-slider" id="rateSlider" min="0.5" max="2" value="1" step="0.1">
                </div>
                <div class="control-group">
                    <div class="control-label"><i class="fas fa-chart-line"></i> Pitch: <span id="pitchValue">1.0</span></div>
                    <input type="range" class="pitch-slider" id="pitchSlider" min="0" max="2" value="1" step="0.1">
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:15</span>
            </div>
        </div>

        <!-- Main Control Buttons -->
        <div class="main-controls">
            <button class="main-btn primary" onclick="speak()" id="speakBtn">
                <i class="fas fa-play"></i> Speak
            </button>
            <button class="main-btn" onclick="pauseSpeech()" id="pauseBtn" disabled>
                <i class="fas fa-pause"></i> Pause
            </button>
            <button class="main-btn" onclick="resumeSpeech()" id="resumeBtn" disabled>
                <i class="fas fa-play"></i> Resume
            </button>
            <button class="main-btn" onclick="stopSpeech()" id="stopBtn" disabled>
                <i class="fas fa-stop"></i> Stop
            </button>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn" onclick="loadSample('welcome')">
                <i class="fas fa-hand-peace"></i> Welcome
            </button>
            <button class="action-btn" onclick="loadSample('quote')">
                <i class="fas fa-quote-right"></i> Quote
            </button>
            <button class="action-btn" onclick="loadSample('facts')">
                <i class="fas fa-lightbulb"></i> Facts
            </button>
            <button class="action-btn" onclick="loadSample('story')">
                <i class="fas fa-book"></i> Story
            </button>
        </div>

        <!-- Quick Samples -->
        <div class="samples-section">
            <div class="samples-title">
                <i class="fas fa-star"></i> Quick Samples
            </div>
            <div class="samples-grid">
                <div class="sample-item" onclick="loadSample('hello')">
                    <i class="fas fa-globe"></i> Hello
                </div>
                <div class="sample-item" onclick="loadSample('numbers')">
                    <i class="fas fa-hashtag"></i> Numbers
                </div>
                <div class="sample-item" onclick="loadSample('time')">
                    <i class="fas fa-clock"></i> Time
                </div>
                <div class="sample-item" onclick="loadSample('date')">
                    <i class="fas fa-calendar"></i> Date
                </div>
                <div class="sample-item" onclick="loadSample('weather')">
                    <i class="fas fa-cloud-sun"></i> Weather
                </div>
                <div class="sample-item" onclick="loadSample('thanks')">
                    <i class="fas fa-heart"></i> Thanks
                </div>
                <div class="sample-item" onclick="loadSample('question')">
                    <i class="fas fa-question"></i> Question
                </div>
                <div class="sample-item" onclick="loadSample('exclamation')">
                    <i class="fas fa-exclamation"></i> Exciting
                </div>
            </div>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Speech Synthesis Setup
        const synth = window.speechSynthesis;
        let utterance = null;
        let isPaused = false;
        let progressInterval = null;

        // DOM Elements
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const rateSlider = document.getElementById('rateSlider');
        const pitchSlider = document.getElementById('pitchSlider');
        const rateValue = document.getElementById('rateValue');
        const pitchValue = document.getElementById('pitchValue');
        const speakBtn = document.getElementById('speakBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        const stopBtn = document.getElementById('stopBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeSpan = document.getElementById('currentTime');
        const totalTimeSpan = document.getElementById('totalTime');
        const wordCountSpan = document.getElementById('wordCount');
        const charCountSpan = document.getElementById('charCount');
        const estTimeSpan = document.getElementById('estTime');

        // Initialize voices
        function loadVoices() {
            const voices = synth.getVoices();
            
            voiceSelect.innerHTML = '';
            
            // Filter for English voices first, then others
            const englishVoices = voices.filter(v => v.lang.startsWith('en'));
            const otherVoices = voices.filter(v => !v.lang.startsWith('en'));
            
            [...englishVoices, ...otherVoices].forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.name;
                option.textContent = `${voice.name} (${voice.lang})`;
                voiceSelect.appendChild(option);
            });
        }

        // Load voices when available
        if (synth) {
            loadVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = loadVoices;
            }
        }

        // Update stats
        function updateStats() {
            const text = textInput.value;
            
            // Word count
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            wordCountSpan.textContent = words;
            
            // Character count
            charCountSpan.textContent = text.length;
            
            // Estimated speaking time (average 150 words per minute)
            const minutes = words / 150;
            const seconds = Math.round(minutes * 60);
            if (seconds < 60) {
                estTimeSpan.textContent = `~${seconds}s`;
                totalTimeSpan.textContent = `0:${seconds.toString().padStart(2, '0')}`;
            } else {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                estTimeSpan.textContent = `~${mins}:${secs.toString().padStart(2, '0')}`;
                totalTimeSpan.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        // Speak text
        function speak() {
            const text = textInput.value.trim();
            if (!text) {
                alert('Please enter some text');
                return;
            }

            // Stop any current speech
            stopSpeech();

            // Create new utterance
            utterance = new SpeechSynthesisUtterance(text);
            
            // Set voice
            const selectedVoice = voiceSelect.selectedOptions[0]?.textContent.split(' ')[0];
            const voices = synth.getVoices();
            utterance.voice = voices.find(v => v.name === selectedVoice) || voices[0];
            
            // Set rate and pitch
            utterance.rate = parseFloat(rateSlider.value);
            utterance.pitch = parseFloat(pitchSlider.value);
            
            // Event handlers
            utterance.onstart = handleStart;
            utterance.onend = handleEnd;
            utterance.onpause = handlePause;
            utterance.onresume = handleResume;
            utterance.onboundary = handleBoundary;
            
            // Start speaking
            synth.speak(utterance);
        }

        // Handle start
        function handleStart() {
            speakBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            resumeBtn.disabled = true;
            
            // Start progress tracking
            startProgress();
        }

        // Handle end
        function handleEnd() {
            resetControls();
            progressFill.style.width = '0%';
            currentTimeSpan.textContent = '0:00';
        }

        // Handle pause
        function handlePause() {
            isPaused = true;
            pauseBtn.disabled = true;
            resumeBtn.disabled = false;
        }

        // Handle resume
        function handleResume() {
            isPaused = false;
            pauseBtn.disabled = false;
            resumeBtn.disabled = true;
        }

        // Handle word boundary
        function handleBoundary(event) {
            // Could be used for word highlighting
        }

        // Pause speech
        function pauseSpeech() {
            if (synth && synth.speaking) {
                synth.pause();
            }
        }

        // Resume speech
        function resumeSpeech() {
            if (synth && synth.paused) {
                synth.resume();
            }
        }

        // Stop speech
        function stopSpeech() {
            if (synth) {
                synth.cancel();
                resetControls();
                if (progressInterval) {
                    clearInterval(progressInterval);
                    progressInterval = null;
                }
                progressFill.style.width = '0%';
                currentTimeSpan.textContent = '0:00';
            }
        }

        // Reset control buttons
        function resetControls() {
            speakBtn.disabled = false;
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
            stopBtn.disabled = true;
            isPaused = false;
        }

        // Start progress tracking
        function startProgress() {
            if (progressInterval) clearInterval(progressInterval);
            
            const startTime = Date.now();
            const words = textInput.value.trim().split(/\s+/).length;
            const estimatedDuration = (words / 150) * 60 * 1000; // milliseconds
            
            progressInterval = setInterval(() => {
                if (!synth.speaking || isPaused) return;
                
                const elapsed = Date.now() - startTime;
                const progress = Math.min((elapsed / estimatedDuration) * 100, 100);
                
                progressFill.style.width = progress + '%';
                
                // Update current time
                const seconds = Math.floor(elapsed / 1000);
                const minutes = Math.floor(seconds / 60);
                const remainingSeconds = seconds % 60;
                currentTimeSpan.textContent = `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
                
                if (progress >= 100) {
                    clearInterval(progressInterval);
                    progressInterval = null;
                }
            }, 100);
        }

        // Load sample text
        function loadSample(type) {
            const samples = {
                hello: 'Hello, welcome to SG Multi Tools text to speech service.',
                numbers: 'One, two, three, four, five, six, seven, eight, nine, ten.',
                time: 'The current time is ' + new Date().toLocaleTimeString(),
                date: 'Today is ' + new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),
                weather: 'The weather today is sunny with a high of 75 degrees Fahrenheit.',
                thanks: 'Thank you for using SG Multi Tools. We appreciate your support.',
                question: 'Would you like to hear more text to speech examples?',
                exclamation: 'Wow! This is absolutely amazing! Great job!',
                welcome: 'Welcome to SG Multi Tools. This is a text to speech demonstration.',
                quote: 'The only way to do great work is to love what you do. - Steve Jobs',
                facts: 'The human heart beats about 100,000 times per day and pumps about 2,000 gallons of blood.',
                story: 'Once upon a time, in a land far, far away, there lived a wise old owl who helped all the forest animals solve their problems.'
            };
            
            textInput.value = samples[type];
            updateStats();
        }

        // Update slider values
        rateSlider.addEventListener('input', () => {
            rateValue.textContent = rateSlider.value + 'x';
        });

        pitchSlider.addEventListener('input', () => {
            pitchValue.textContent = pitchSlider.value;
        });

        // Update stats on input
        textInput.addEventListener('input', updateStats);

        // Initialize
        window.addEventListener('load', () => {
            updateStats();
            
            // Set default rate and pitch
            rateValue.textContent = rateSlider.value + 'x';
            pitchValue.textContent = pitchSlider.value;
        });

        // Handle voice loading
        if (synth) {
            if (synth.getVoices().length > 0) {
                loadVoices();
            }
        } else {
            alert('Your browser does not support text to speech. Try Chrome or Edge.');
            speakBtn.disabled = true;
        }
    </script>
</body>
</html>
