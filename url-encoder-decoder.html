<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>URL Encoder/Decoder - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .encoder-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Example buttons */
        .examples {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .example-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 60px;
            text-align: center;
        }

        .example-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #42f8f5;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 4px;
            display: block;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 4px;
        }

        .tool-textarea {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            resize: vertical;
            min-height: 70px;
            max-height: 120px;
        }

        .tool-textarea:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .tool-textarea::placeholder {
            color: #6d8ba0;
        }

        .tool-textarea[readonly] {
            background: #1e2b37;
            color: #42f8f5;
            cursor: default;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            color: #b0c4de;
            font-size: 0.7rem;
            padding: 0 3px;
            margin-top: 5px;
        }

        .stats-row span {
            color: #42f8f5;
            font-weight: 600;
        }

        /* Select Dropdown */
        .tool-select {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2342f8f5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            margin-bottom: 12px;
        }

        .tool-select:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 8px rgba(66, 248, 245, 0.3);
        }

        .tool-select option {
            background: #1c222d;
            color: white;
        }

        /* Action Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 15px 0;
        }

        .tool-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tool-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .tool-btn i {
            margin-right: 3px;
        }

        .tool-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .tool-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* Checkbox Options */
        .options-row {
            display: flex;
            gap: 15px;
            margin: 12px 0;
            color: white;
            font-size: 0.75rem;
            flex-wrap: wrap;
        }

        .options-row label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .options-row input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #42f8f5;
            cursor: pointer;
        }

        /* Info Display */
        .info-display {
            background: #12151a;
            border-radius: 20px;
            padding: 10px;
            margin: 12px 0;
            border: 1px solid #42f8f5;
            color: #b0c4de;
            font-size: 0.8rem;
            text-align: center;
        }

        .info-display i {
            color: #42f8f5;
            margin-right: 5px;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .encoder-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .examples {
                flex-direction: column;
                gap: 5px;
            }
            
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .options-row {
                flex-direction: column;
                gap: 8px;
            }
            
            .tool-textarea {
                min-height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="encoder-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">🔗</span> URL Encoder/Decoder
            </div>
            <div class="card-badge">ENCODE</div>
        </div>

        <!-- Example buttons -->
        <div class="examples">
            <button class="example-btn" onclick="setExample('url')">URL</button>
            <button class="example-btn" onclick="setExample('query')">Query</button>
            <button class="example-btn" onclick="setExample('email')">Email</button>
            <button class="example-btn" onclick="setExample('special')">Special</button>
        </div>

        <!-- Input Textarea -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-pencil-alt"></i> Input</label>
            <textarea class="tool-textarea" id="inputText" placeholder="Enter text to encode/decode...">https://example.com/search?q=hello world&page=1</textarea>

            <!-- Stats Row -->
            <div class="stats-row">
                <div>Characters: <span id="charCount">44</span></div>
                <div>Encoded length: <span id="encodedLength">62</span></div>
            </div>
        </div>

        <!-- Action Mode Select -->
        <label class="input-label"><i class="fas fa-cog"></i> Action</label>
        <select class="tool-select" id="actionMode">
            <option value="encode">ENCODE (URL Encode)</option>
            <option value="decode">DECODE (URL Decode)</option>
        </select>

        <!-- Output Textarea -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-file-alt"></i> Output</label>
            <textarea class="tool-textarea" id="outputText" placeholder="Result will appear here..." readonly></textarea>
        </div>

        <!-- Action Grid -->
        <div class="action-grid">
            <button class="tool-btn primary" onclick="process()">
                <i class="fas fa-sync-alt"></i> Process
            </button>
            <button class="tool-btn" onclick="swap()">
                <i class="fas fa-exchange-alt"></i> Swap
            </button>
            <button class="tool-btn" onclick="copyOutput()">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button class="tool-btn" onclick="clearAll()">
                <i class="fas fa-eraser"></i> Clear
            </button>
        </div>

        <!-- Additional Options -->
        <div class="options-row">
            <label>
                <input type="checkbox" id="encodeAll" checked> Encode all characters
            </label>
            <label>
                <input type="checkbox" id="plusSpaces"> Convert spaces to +
            </label>
        </div>

        <!-- Info Display -->
        <div class="info-display" id="infoDisplay">
            <i class="fas fa-info-circle"></i> Ready to process
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Update character count
        function updateCounts() {
            const input = document.getElementById('inputText').value;
            const output = document.getElementById('outputText').value;
            
            document.getElementById('charCount').textContent = input.length;
            document.getElementById('encodedLength').textContent = output.length;
        }

        // Process function
        function process() {
            const input = document.getElementById('inputText').value;
            const mode = document.getElementById('actionMode').value;
            const encodeAll = document.getElementById('encodeAll').checked;
            const plusSpaces = document.getElementById('plusSpaces').checked;
            
            let output = '';
            let info = '';
            
            try {
                if (mode === 'encode') {
                    if (encodeAll) {
                        // Encode all special characters
                        output = encodeURIComponent(input);
                    } else {
                        // Standard URL encoding
                        output = encodeURI(input);
                    }
                    
                    if (plusSpaces) {
                        output = output.replace(/%20/g, '+');
                    }
                    
                    info = '✓ Text encoded successfully';
                } else {
                    // Decode
                    try {
                        output = decodeURIComponent(input);
                        info = '✓ Text decoded successfully';
                    } catch {
                        // Try standard decode
                        output = decodeURI(input);
                        info = '✓ Text decoded successfully';
                    }
                }
            } catch (error) {
                output = 'Error: Invalid input for decoding';
                info = '✗ Processing failed';
            }
            
            document.getElementById('outputText').value = output;
            document.getElementById('infoDisplay').innerHTML = `<i class="fas fa-info-circle"></i> ${info}`;
            updateCounts();
        }

        // Swap input and output
        function swap() {
            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            
            const temp = input.value;
            input.value = output.value;
            output.value = temp;
            
            // Auto-process after swap
            process();
        }

        // Copy output to clipboard
        function copyOutput() {
            const output = document.getElementById('outputText').value;
            if (!output) {
                alert('No output to copy');
                return;
            }
            
            navigator.clipboard.writeText(output).then(() => {
                document.getElementById('infoDisplay').innerHTML = '<i class="fas fa-check-circle"></i> Copied to clipboard!';
                setTimeout(() => {
                    document.getElementById('infoDisplay').innerHTML = '<i class="fas fa-info-circle"></i> Ready';
                }, 2000);
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Clear all fields
        function clearAll() {
            if (document.getElementById('inputText').value || document.getElementById('outputText').value) {
                if (confirm('Clear all fields?')) {
                    document.getElementById('inputText').value = '';
                    document.getElementById('outputText').value = '';
                    document.getElementById('infoDisplay').innerHTML = '<i class="fas fa-info-circle"></i> Cleared';
                    updateCounts();
                }
            }
        }

        // Set example text
        function setExample(type) {
            const examples = {
                url: 'https://example.com/search?q=hello world&page=1',
                query: 'name=John Doe&age=25&city=New York',
                email: 'user@example.com?subject=Hello&body=How are you?',
                special: 'Special characters: @#$%^&*()_+[]{};:,.<>/'
            };
            
            document.getElementById('inputText').value = examples[type];
            process();
        }

        // Auto-process on input change
        document.getElementById('inputText').addEventListener('input', () => {
            const mode = document.getElementById('actionMode').value;
            if (mode === 'encode') {
                process();
            }
        });

        document.getElementById('actionMode').addEventListener('change', process);
        document.getElementById('encodeAll').addEventListener('change', process);
        document.getElementById('plusSpaces').addEventListener('change', process);

        // Initial process
        window.addEventListener('load', () => {
            process();
        });
    </script>
</body>
</html>
