<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Background from style.css */
        }

        .tool-container {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            padding: 1.3rem;
            background: #E8DE99;  /* Champagne background */
            border-radius: 18px;
            border: 2px solid #42f8f5;
            box-shadow: 0 0 20px rgba(66, 248, 245, 0.3);
        }
        
        .tool-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.2rem;
            border-bottom: 2px solid #42f8f5;
            padding-bottom: 10px;
        }
        
        .tool-icon {
            font-size: 2rem;
            color: #42f8f5;
        }
        
        .tool-header h1 {
            color: #1c222d;  /* Dark text */
            font-size: 1.6rem;
            font-weight: 600;
        }

        .tool-badge {
            background: #E8DE99;  /* Match card background */
            color: #1c222d;       /* Dark text */
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #42f8f5;
            margin-left: auto;
            text-transform: uppercase;
        }

        /* Timer Display */
        .timer-display {
            background: #1c222d;  /* Dark background for contrast */
            border-radius: 20px;
            padding: 2rem 1rem;
            margin: 1.5rem 0;
            border: 2px solid #42f8f5;
            box-shadow: inset 0 0 20px rgba(66, 248, 245, 0.2);
            text-align: center;
        }

        #timer {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: monospace;
            color: #42f8f5;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(66, 248, 245, 0.5);
        }

        .timer-controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 1.5rem 0;
        }

        .btn {
            background: #1c222d;  /* Dark button */
            border: 2px solid #42f8f5;
            border-radius: 40px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        .btn.primary {
            background: #42f8f5;
            color: #1c222d;
            font-weight: 700;
        }

        .btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        .btn.warning {
            background: #5f3e3e;
            border-color: #ff6b6b;
            color: #ffb3b3;
        }

        .btn.warning:hover {
            background: #ff6b6b;
            color: #1c222d;
            border-color: #ff6b6b;
        }

        .lap-times {
            margin: 1.5rem 0;
            background: #1c222d;  /* Dark background */
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid #42f8f5;
            max-height: 200px;
            overflow-y: auto;
        }

        .lap-title {
            color: #42f8f5;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lap-title button {
            background: transparent;
            border: 1px solid #42f8f5;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lap-title button:hover {
            background: #42f8f5;
            color: #1c222d;
        }

        .lap-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            background: #1c222d;
            border-radius: 6px;
            font-family: monospace;
            color: #c5d1de;
            border-left: 3px solid #42f8f5;
        }

        .lap-item span:first-child {
            color: #42f8f5;
            font-weight: 600;
        }

        .home-link {
            display: inline-block;
            margin-top: 1.2rem;
            color: #1c222d;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 22px;
            border: 2px solid #42f8f5;
            border-radius: 30px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin-top: 1.5rem;
            color: #1c222d;
            font-size: 0.85rem;
            text-align: center;
        }

        .footer-email a {
            color: #1c222d;
            text-decoration: none;
        }

        .footer-email a:hover {
            color: #42f8f5;
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .tool-container {
                padding: 1rem;
            }
            
            #timer {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            
            .timer-controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="tool-container">
        <!-- Header -->
        <div class="tool-header">
            <span class="tool-icon">⏱️</span>
            <h1>Timer</h1>
            <span class="tool-badge">TIMER</span>
        </div>

        <!-- Description - Hidden on mobile -->
        <div class="mobile-hide" style="color: #4A3B2C; font-size: 0.85rem; margin-bottom: 1.2rem; line-height: 1.4;">
            Simple timer and stopwatch with lap functionality.
        </div>

        <!-- Timer Display -->
        <div class="timer-display">
            <div id="timer">00:00:00</div>
        </div>

        <!-- Control Buttons -->
        <div class="timer-controls">
            <button class="btn primary" id="startBtn"><i class="fas fa-play"></i> Start</button>
            <button class="btn" id="pauseBtn"><i class="fas fa-pause"></i> Pause</button>
            <button class="btn warning" id="resetBtn"><i class="fas fa-stop"></i> Reset</button>
            <button class="btn" id="lapBtn"><i class="fas fa-flag"></i> Lap</button>
        </div>

        <!-- Lap Times -->
        <div class="lap-times">
            <div class="lap-title">
                <span><i class="fas fa-history" style="color: #42f8f5;"></i> Lap Times</span>
                <button id="clearLapsBtn" onclick="clearLaps()">Clear</button>
            </div>
            <ul class="lap-list" id="lapList">
                <li class="lap-item" style="justify-content: center; color: #6d8ba0; border-left: none;">
                    Click "Lap" to record times
                </li>
            </ul>
        </div>

        <!-- Navigation -->
        <div style="text-align: center;">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>

        <div class="footer-email">
            📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
        </div>
    </div>

    <script>
        let timer;
        let isRunning = false;
        let seconds = 0;
        let minutes = 0;
        let hours = 0;
        let lapCount = 1;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const lapBtn = document.getElementById('lapBtn');
        const lapList = document.getElementById('lapList');

        function updateDisplay() {
            let displayHours = hours < 10 ? '0' + hours : hours;
            let displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            let displaySeconds = seconds < 10 ? '0' + seconds : seconds;
            
            timerDisplay.textContent = `${displayHours}:${displayMinutes}:${displaySeconds}`;
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                timer = setInterval(() => {
                    seconds++;
                    if (seconds === 60) {
                        seconds = 0;
                        minutes++;
                        if (minutes === 60) {
                            minutes = 0;
                            hours++;
                        }
                    }
                    updateDisplay();
                }, 1000);
            }
        }

        function pauseTimer() {
            clearInterval(timer);
            isRunning = false;
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            seconds = 0;
            minutes = 0;
            hours = 0;
            updateDisplay();
            
            // Clear laps on reset
            lapList.innerHTML = '<li class="lap-item" style="justify-content: center; color: #6d8ba0; border-left: none;">Click "Lap" to record times</li>';
            lapCount = 1;
        }

        function recordLap() {
            if (isRunning) {
                let displayHours = hours < 10 ? '0' + hours : hours;
                let displayMinutes = minutes < 10 ? '0' + minutes : minutes;
                let displaySeconds = seconds < 10 ? '0' + seconds : seconds;
                
                const lapTime = `${displayHours}:${displayMinutes}:${displaySeconds}`;
                
                if (lapList.children[0] && lapList.children[0].textContent.includes('Click "Lap"')) {
                    lapList.innerHTML = '';
                }
                
                const lapItem = document.createElement('li');
                lapItem.className = 'lap-item';
                lapItem.innerHTML = `<span>Lap ${lapCount}</span> <span>${lapTime}</span>`;
                lapList.appendChild(lapItem);
                
                lapCount++;
                lapList.scrollTop = lapList.scrollHeight;
            } else {
                alert('Start the timer first to record laps');
            }
        }

        function clearLaps() {
            lapList.innerHTML = '<li class="lap-item" style="justify-content: center; color: #6d8ba0; border-left: none;">Click "Lap" to record times</li>';
            lapCount = 1;
        }

        // Event listeners
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        lapBtn.addEventListener('click', recordLap);

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
