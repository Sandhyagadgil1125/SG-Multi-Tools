<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Timer & Stopwatch - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .timer-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Mode Tabs */
        .mode-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .mode-tab {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-tab:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .mode-tab.active {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .mode-tab i {
            margin-right: 5px;
        }

        /* Timer Display */
        .time-display {
            background: #12151a;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
            text-align: center;
        }

        .time-value {
            color: #42f8f5;
            font-size: 3.5rem;
            font-weight: 700;
            font-family: monospace;
            line-height: 1.2;
        }

        .time-label {
            color: #b0c4de;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Timer Input Section */
        .timer-input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .time-input-group {
            flex: 1;
            text-align: center;
        }

        .time-input-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        .time-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 8px;
            color: white;
            font-size: 1rem;
            font-family: monospace;
            text-align: center;
            outline: none;
        }

        .time-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 8px rgba(66, 248, 245, 0.3);
        }

        /* Preset Buttons */
        .presets-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .presets-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .presets-title i {
            color: #42f8f5;
        }

        .presets-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .preset-btn {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 8px 3px;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
        }

        /* Control Buttons */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .control-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 30px;
            padding: 12px 5px;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .control-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .control-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .control-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .control-btn i {
            margin-right: 5px;
        }

        /* Lap Times */
        .laps-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
            max-height: 120px;
            overflow-y: auto;
        }

        .laps-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .laps-title i {
            color: #42f8f5;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-bottom: 1px solid #42f8f5;
            color: #b0c4de;
            font-size: 0.8rem;
        }

        .lap-item:last-child {
            border-bottom: none;
        }

        .lap-number {
            color: #42f8f5;
            font-weight: 600;
        }

        .lap-time {
            font-family: monospace;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 8px 5px;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .timer-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .time-value {
                font-size: 2.5rem;
            }
            
            .input-row {
                flex-direction: column;
                gap: 5px;
            }
            
            .presets-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .control-grid {
                grid-template-columns: 1fr;
            }
            
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .laps-section {
                max-height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="timer-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">⏱️</span> Timer & Stopwatch
            </div>
            <div class="card-badge">TIMER</div>
        </div>

        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <div class="mode-tab active" id="stopwatchTab" onclick="switchMode('stopwatch')">
                <i class="fas fa-stopwatch"></i> Stopwatch
            </div>
            <div class="mode-tab" id="timerTab" onclick="switchMode('timer')">
                <i class="fas fa-hourglass-half"></i> Timer
            </div>
        </div>

        <!-- Timer Display -->
        <div class="time-display">
            <div class="time-value" id="timeDisplay">00:00.00</div>
            <div class="time-label" id="timeLabel">Stopwatch</div>
        </div>

        <!-- Timer Input Section (hidden by default) -->
        <div class="timer-input-section" id="timerInputSection" style="display: none;">
            <div class="input-row">
                <div class="time-input-group">
                    <div class="time-input-label">Hours</div>
                    <input type="number" class="time-input" id="hoursInput" min="0" max="23" value="0">
                </div>
                <div class="time-input-group">
                    <div class="time-input-label">Minutes</div>
                    <input type="number" class="time-input" id="minutesInput" min="0" max="59" value="1">
                </div>
                <div class="time-input-group">
                    <div class="time-input-label">Seconds</div>
                    <input type="number" class="time-input" id="secondsInput" min="0" max="59" value="0">
                </div>
            </div>
        </div>

        <!-- Preset Buttons (for Timer mode) -->
        <div class="presets-section" id="presetsSection" style="display: none;">
            <div class="presets-title">
                <i class="fas fa-clock"></i> Quick Presets
            </div>
            <div class="presets-grid">
                <div class="preset-btn" onclick="setTimerPreset(0, 1, 0)">1 min</div>
                <div class="preset-btn" onclick="setTimerPreset(0, 5, 0)">5 min</div>
                <div class="preset-btn" onclick="setTimerPreset(0, 10, 0)">10 min</div>
                <div class="preset-btn" onclick="setTimerPreset(0, 15, 0)">15 min</div>
                <div class="preset-btn" onclick="setTimerPreset(0, 30, 0)">30 min</div>
                <div class="preset-btn" onclick="setTimerPreset(1, 0, 0)">1 hour</div>
                <div class="preset-btn" onclick="setTimerPreset(0, 45, 0)">45 min</div>
                <div class="preset-btn" onclick="setTimerPreset(0, 20, 0)">20 min</div>
                <div class="preset-btn" onclick="setTimerPreset(0, 3, 0)">3 min</div>
                <div class="preset-btn" onclick="setTimerPreset(0, 0, 30)">30 sec</div>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="control-grid">
            <button class="control-btn primary" id="startBtn" onclick="startTimer()">
                <i class="fas fa-play"></i> Start
            </button>
            <button class="control-btn" id="pauseBtn" onclick="pauseTimer()" disabled>
                <i class="fas fa-pause"></i> Pause
            </button>
            <button class="control-btn" id="resetBtn" onclick="resetTimer()">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <!-- Lap Times (for Stopwatch mode) -->
        <div class="laps-section" id="lapsSection">
            <div class="laps-title">
                <i class="fas fa-list"></i> Lap Times
                <span style="flex:1;"></span>
                <span class="action-btn" style="padding: 2px 8px;" onclick="clearLaps()">Clear</span>
            </div>
            <div id="lapsContainer">
                <!-- Lap items will be added here -->
                <div class="lap-item">
                    <span class="lap-number">Lap 1</span>
                    <span class="lap-time">00:00.00</span>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn" id="lapBtn" onclick="recordLap()">
                <i class="fas fa-flag"></i> Lap
            </button>
            <button class="action-btn" onclick="copyTime()">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button class="action-btn" onclick="shareTime()">
                <i class="fas fa-share-alt"></i> Share
            </button>
            <button class="action-btn" onclick="fullscreenTimer()">
                <i class="fas fa-expand"></i> Fullscreen
            </button>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Timer variables
        let mode = 'stopwatch'; // 'stopwatch' or 'timer'
        let interval = null;
        let startTime = 0;
        let elapsedTime = 0;
        let timerDuration = 0;
        let isRunning = false;
        let laps = [];
        let lapCount = 0;

        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const timeLabel = document.getElementById('timeLabel');
        const stopwatchTab = document.getElementById('stopwatchTab');
        const timerTab = document.getElementById('timerTab');
        const timerInputSection = document.getElementById('timerInputSection');
        const presetsSection = document.getElementById('presetsSection');
        const lapsSection = document.getElementById('lapsSection');
        const lapsContainer = document.getElementById('lapsContainer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const lapBtn = document.getElementById('lapBtn');
        const hoursInput = document.getElementById('hoursInput');
        const minutesInput = document.getElementById('minutesInput');
        const secondsInput = document.getElementById('secondsInput');

        // Switch mode
        function switchMode(newMode) {
            mode = newMode;
            
            // Update tabs
            stopwatchTab.classList.toggle('active', mode === 'stopwatch');
            timerTab.classList.toggle('active', mode === 'timer');
            
            // Show/hide sections
            timerInputSection.style.display = mode === 'timer' ? 'block' : 'none';
            presetsSection.style.display = mode === 'timer' ? 'block' : 'none';
            
            // Update lap button and label
            if (mode === 'stopwatch') {
                timeLabel.textContent = 'Stopwatch';
                lapBtn.style.display = 'block';
                lapsSection.style.display = 'block';
            } else {
                timeLabel.textContent = 'Timer';
                lapBtn.style.display = 'none';
                lapsSection.style.display = 'none';
            }
            
            // Reset timer
            resetTimer();
        }

        // Format time
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const milliseconds = Math.floor((ms % 1000) / 10);
            
            if (hours > 0) {
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${milliseconds.toString().padStart(2, '0')}`;
            } else {
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${milliseconds.toString().padStart(2, '0')}`;
            }
        }

        // Update display
        function updateDisplay() {
            if (mode === 'stopwatch') {
                timeDisplay.textContent = formatTime(elapsedTime);
            } else {
                const remaining = Math.max(0, timerDuration - elapsedTime);
                timeDisplay.textContent = formatTime(remaining);
                
                if (remaining <= 0 && isRunning) {
                    timerComplete();
                }
            }
        }

        // Timer tick
        function tick() {
            const now = Date.now();
            elapsedTime = now - startTime;
            updateDisplay();
        }

        // Start timer
        function startTimer() {
            if (isRunning) return;
            
            if (mode === 'timer') {
                // Get timer duration from inputs
                const hours = parseInt(hoursInput.value) || 0;
                const minutes = parseInt(minutesInput.value) || 0;
                const seconds = parseInt(secondsInput.value) || 0;
                
                timerDuration = (hours * 3600 + minutes * 60 + seconds) * 1000;
                
                if (timerDuration <= 0) {
                    alert('Please set a valid timer duration');
                    return;
                }
                
                // Reset elapsed time if starting fresh
                if (elapsedTime >= timerDuration || elapsedTime === 0) {
                    elapsedTime = 0;
                }
            }
            
            isRunning = true;
            startTime = Date.now() - elapsedTime;
            interval = setInterval(tick, 10);
            
            // Update buttons
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            resetBtn.disabled = false;
            lapBtn.disabled = mode === 'stopwatch' ? false : true;
            
            // Disable inputs in timer mode
            if (mode === 'timer') {
                hoursInput.disabled = true;
                minutesInput.disabled = true;
                secondsInput.disabled = true;
            }
        }

        // Pause timer
        function pauseTimer() {
            if (!isRunning) return;
            
            clearInterval(interval);
            isRunning = false;
            
            // Update buttons
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            
            // Enable inputs in timer mode
            if (mode === 'timer') {
                hoursInput.disabled = false;
                minutesInput.disabled = false;
                secondsInput.disabled = false;
            }
        }

        // Reset timer
        function resetTimer() {
            clearInterval(interval);
            isRunning = false;
            elapsedTime = 0;
            
            if (mode === 'stopwatch') {
                laps = [];
                lapCount = 0;
                renderLaps();
            } else {
                timerDuration = 0;
            }
            
            updateDisplay();
            
            // Update buttons
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            lapBtn.disabled = mode === 'stopwatch' ? false : true;
            
            // Enable inputs in timer mode
            if (mode === 'timer') {
                hoursInput.disabled = false;
                minutesInput.disabled = false;
                secondsInput.disabled = false;
                hoursInput.value = 0;
                minutesInput.value = 1;
                secondsInput.value = 0;
            }
        }

        // Timer complete
        function timerComplete() {
            clearInterval(interval);
            isRunning = false;
            
            // Play sound
            playAlert();
            
            // Update buttons
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            
            // Enable inputs
            hoursInput.disabled = false;
            minutesInput.disabled = false;
            secondsInput.disabled = false;
            
            // Flash display
            timeDisplay.style.color = '#ff6b6b';
            setTimeout(() => {
                timeDisplay.style.color = '#42f8f5';
            }, 2000);
        }

        // Play alert sound
        function playAlert() {
            // Simple beep using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.5;
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Record lap
        function recordLap() {
            if (mode !== 'stopwatch' || !isRunning) return;
            
            lapCount++;
            laps.push({
                number: lapCount,
                time: elapsedTime
            });
            
            renderLaps();
        }

        // Render laps
        function renderLaps() {
            if (laps.length === 0) {
                lapsContainer.innerHTML = '<div class="lap-item"><span class="lap-number">Lap 1</span><span class="lap-time">00:00.00</span></div>';
                return;
            }
            
            lapsContainer.innerHTML = laps.map(lap => `
                <div class="lap-item">
                    <span class="lap-number">Lap ${lap.number}</span>
                    <span class="lap-time">${formatTime(lap.time)}</span>
                </div>
            `).join('');
        }

        // Clear laps
        function clearLaps() {
            if (confirm('Clear all lap times?')) {
                laps = [];
                lapCount = 0;
                renderLaps();
            }
        }

        // Set timer preset
        function setTimerPreset(hours, minutes, seconds) {
            hoursInput.value = hours;
            minutesInput.value = minutes;
            secondsInput.value = seconds;
            
            if (!isRunning) {
                timerDuration = (hours * 3600 + minutes * 60 + seconds) * 1000;
                elapsedTime = 0;
                updateDisplay();
            }
        }

        // Copy current time
        function copyTime() {
            const time = timeDisplay.textContent;
            navigator.clipboard.writeText(time).then(() => {
                showNotification('Time copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Share time
        function shareTime() {
            const time = timeDisplay.textContent;
            const text = `My ${mode} time: ${time}`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Timer/Stopwatch',
                    text: text
                }).catch(() => {
                    alert(text);
                });
            } else {
                alert(text);
            }
        }

        // Fullscreen mode
        function fullscreenTimer() {
            const elem = document.querySelector('.timer-card');
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            }
        }

        // Show notification
        function showNotification(message) {
            alert(message);
        }

        // Initialize
        window.addEventListener('load', () => {
            switchMode('stopwatch');
            resetTimer();
        });
    </script>
</body>
</html>
