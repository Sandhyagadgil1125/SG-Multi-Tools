<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>QR Code Generator - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .qrcode-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.75rem;
            margin-bottom: 5px;
            display: block;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 5px;
        }

        .text-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 10px;
        }

        .text-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .text-input::placeholder {
            color: #6d8ba0;
        }

        /* QR Code Display */
        .qrcode-display {
            background: #12151a;
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        #qrcode {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        #qrcode img {
            margin: 0 auto;
            display: block;
        }

        /* Options Row */
        .options-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .option-select {
            flex: 1;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            min-width: 100px;
        }

        .option-select:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 8px rgba(66, 248, 245, 0.3);
        }

        /* Size Slider */
        .size-section {
            margin: 15px 0;
        }

        .size-header {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .size-header span {
            color: #42f8f5;
            font-weight: 600;
        }

        .size-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #1e2b37;
            outline: none;
            -webkit-appearance: none;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #42f8f5;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(66, 248, 245, 0.4);
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
            font-size: 0.8rem;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* Quick Examples */
        .examples-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .examples-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .examples-title i {
            color: #42f8f5;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .example-item {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 8px 3px;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .example-item:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
        }

        .example-item i {
            display: block;
            font-size: 1rem;
            margin-bottom: 3px;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .qrcode-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .action-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .examples-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .options-row {
                flex-direction: column;
            }
            
            .qrcode-display {
                min-height: 180px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="qrcode-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">📱</span> QR Code Generator
            </div>
            <div class="card-badge">QR</div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-pencil-alt"></i> Text or URL</label>
            <textarea class="text-input" id="qrText" placeholder="Enter text, URL, or any data...">https://sgtools.in</textarea>
            
            <!-- Options Row -->
            <div class="options-row">
                <select class="option-select" id="errorCorrection">
                    <option value="L">Low (7%)</option>
                    <option value="M" selected>Medium (15%)</option>
                    <option value="Q">Quartile (25%)</option>
                    <option value="H">High (30%)</option>
                </select>
                
                <select class="option-select" id="qrFormat">
                    <option value="png">PNG</option>
                    <option value="svg">SVG</option>
                    <option value="jpeg">JPEG</option>
                </select>
            </div>
        </div>

        <!-- QR Code Display -->
        <div class="qrcode-display">
            <div id="qrcode"></div>
        </div>

        <!-- Size Slider -->
        <div class="size-section">
            <div class="size-header">
                <span>QR Code Size</span>
                <span id="sizeValue">200 x 200</span>
            </div>
            <input type="range" class="size-slider" id="sizeSlider" min="100" max="400" value="200" step="10" oninput="updateSize()">
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="generateQR()">
                <i class="fas fa-qrcode"></i> Generate
            </button>
            <button class="action-btn" onclick="downloadQR()">
                <i class="fas fa-download"></i> Download
            </button>
            <button class="action-btn" onclick="copyQR()">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button class="action-btn" onclick="clearQR()">
                <i class="fas fa-eraser"></i> Clear
            </button>
        </div>

        <!-- Quick Examples -->
        <div class="examples-section">
            <div class="examples-title">
                <i class="fas fa-star"></i> Quick Examples
            </div>
            <div class="examples-grid" id="examplesGrid">
                <div class="example-item" onclick="setExample('url')">
                    <i class="fas fa-link"></i> URL
                </div>
                <div class="example-item" onclick="setExample('text')">
                    <i class="fas fa-font"></i> Text
                </div>
                <div class="example-item" onclick="setExample('email')">
                    <i class="fas fa-envelope"></i> Email
                </div>
                <div class="example-item" onclick="setExample('phone')">
                    <i class="fas fa-phone"></i> Phone
                </div>
                <div class="example-item" onclick="setExample('wifi')">
                    <i class="fas fa-wifi"></i> WiFi
                </div>
                <div class="example-item" onclick="setExample('vcard')">
                    <i class="fas fa-address-card"></i> vCard
                </div>
                <div class="example-item" onclick="setExample('sms')">
                    <i class="fas fa-comment"></i> SMS
                </div>
                <div class="example-item" onclick="setExample('location')">
                    <i class="fas fa-map-marker-alt"></i> Location
                </div>
            </div>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Global variables
        let qrcode = null;
        let currentSize = 200;

        // Initialize
        function init() {
            generateQR();
        }

        // Generate QR Code
        function generateQR() {
            const text = document.getElementById('qrText').value.trim();
            if (!text) {
                alert('Please enter some text or URL');
                return;
            }

            const errorCorrection = document.getElementById('errorCorrection').value;
            
            // Clear previous QR code
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';

            // Create new QR code
            qrcode = new QRCode(qrContainer, {
                text: text,
                width: currentSize,
                height: currentSize,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: getErrorCorrectionLevel(errorCorrection)
            });
        }

        // Get error correction level
        function getErrorCorrectionLevel(level) {
            switch(level) {
                case 'L': return QRCode.CorrectLevel.L;
                case 'M': return QRCode.CorrectLevel.M;
                case 'Q': return QRCode.CorrectLevel.Q;
                case 'H': return QRCode.CorrectLevel.H;
                default: return QRCode.CorrectLevel.M;
            }
        }

        // Update size
        function updateSize() {
            currentSize = parseInt(document.getElementById('sizeSlider').value);
            document.getElementById('sizeValue').textContent = currentSize + ' x ' + currentSize;
            generateQR();
        }

        // Download QR Code
        function downloadQR() {
            const qrImage = document.querySelector('#qrcode img');
            if (!qrImage) {
                alert('Generate a QR code first');
                return;
            }

            const format = document.getElementById('qrFormat').value;
            const link = document.createElement('a');
            
            if (format === 'svg') {
                // For SVG, we need to get the canvas data differently
                const canvas = document.querySelector('#qrcode canvas');
                if (canvas) {
                    link.download = 'qrcode.svg';
                    link.href = canvas.toDataURL('image/svg+xml');
                }
            } else {
                link.download = 'qrcode.' + format;
                link.href = qrImage.src;
            }
            
            link.click();
        }

        // Copy QR Code to clipboard
        function copyQR() {
            const qrImage = document.querySelector('#qrcode img');
            if (!qrImage) {
                alert('Generate a QR code first');
                return;
            }

            // Create a canvas to copy
            const canvas = document.createElement('canvas');
            canvas.width = currentSize;
            canvas.height = currentSize;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0, currentSize, currentSize);
                canvas.toBlob(function(blob) {
                    navigator.clipboard.write([
                        new ClipboardItem({
                            'image/png': blob
                        })
                    ]).then(() => {
                        alert('QR code copied to clipboard!');
                    }).catch(() => {
                        alert('Could not copy image. You can download it instead.');
                    });
                });
            };
            img.src = qrImage.src;
        }

        // Clear QR Code
        function clearQR() {
            if (confirm('Clear QR code?')) {
                document.getElementById('qrText').value = '';
                document.getElementById('qrcode').innerHTML = '';
            }
        }

        // Set example
        function setExample(type) {
            const examples = {
                url: 'https://sgtools.in',
                text: 'Hello, this is a QR code!',
                email: 'mailto:contact@sgtools.in?subject=Hello&body=Message',
                phone: 'tel:+1234567890',
                wifi: 'WIFI:S:MyNetwork;T:WPA;P:password123;;',
                vcard: 'BEGIN:VCARD\nVERSION:3.0\nN:Last;First\nFN:First Last\nTEL:+1234567890\nEMAIL:contact@sgtools.in\nEND:VCARD',
                sms: 'smsto:+1234567890:Hello',
                location: 'geo:40.7128,-74.0060'
            };
            
            document.getElementById('qrText').value = examples[type];
            generateQR();
        }

        // Event listeners
        document.getElementById('qrText').addEventListener('input', generateQR);
        document.getElementById('errorCorrection').addEventListener('change', generateQR);

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
