<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0f14;  /* Dark theme background */
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .contact-container {
            max-width: 500px;  /* Reduced from 520px for better fit */
            width: 100%;
            background: #1c222d;  /* Dark card background */
            border-radius: 18px;
            padding: 1.5rem;  /* Reduced padding */
            border: 2px solid #42f8f5;
            box-shadow: 0 0 20px rgba(66, 248, 245, 0.2);
            margin: 0 auto;
        }
        
        .contact-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;  /* Reduced margin */
            border-bottom: 2px solid #42f8f5;
            padding-bottom: 8px;  /* Reduced padding */
        }
        
        .contact-icon {
            font-size: 1.8rem;  /* Slightly smaller */
            color: #42f8f5;
        }
        
        .contact-header h1 {
            color: #42f8f5;  /* Cyan heading */
            font-size: 1.5rem;  /* Smaller */
            font-weight: 600;
        }

        .contact-badge {
            background: #12151a;
            color: #42f8f5;
            font-size: 0.65rem;  /* Smaller */
            font-weight: 600;
            padding: 3px 10px;  /* Smaller padding */
            border-radius: 30px;
            border: 1px solid #42f8f5;
            margin-left: auto;
            text-transform: uppercase;
        }

        /* Description */
        .contact-description {
            color: #c5d1de;
            font-size: 0.8rem;  /* Smaller */
            margin-bottom: 1rem;  /* Reduced margin */
            line-height: 1.4;
        }

        /* Form Elements */
        .input-label {
            display: block;
            color: #ffffff;  /* White text */
            font-size: 0.8rem;  /* Smaller */
            font-weight: 500;
            margin-bottom: 0.3rem;  /* Reduced margin */
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 5px;
            width: 16px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 0.7rem 1rem;  /* Smaller padding */
            background: #eef5fa;
            border: 2px solid #3d5a73;
            border-radius: 10px;  /* Smaller radius */
            font-size: 0.85rem;  /* Smaller */
            color: #1c222d;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
            margin-bottom: 0.8rem;  /* Reduced margin */
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 0 3px rgba(66, 248, 245, 0.2);
            outline: none;
            background: #ffffff;
        }

        .form-textarea {
            min-height: 100px;  /* Smaller */
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            background: #42f8f5;
            color: #1c222d;
            border: none;
            padding: 10px;  /* Smaller padding */
            border-radius: 40px;
            font-size: 0.9rem;  /* Smaller */
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #42f8f5;
            letter-spacing: 0.5px;
            margin: 0.5rem 0 1rem 0;  /* Reduced margins */
        }

        .submit-btn:hover {
            background: transparent;
            color: #42f8f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        .submit-btn i {
            margin-right: 6px;
        }

        /* Contact Information */
        .contact-info {
            background: #12151a;  /* Dark background */
            border-radius: 10px;  /* Smaller radius */
            padding: 0.8rem;  /* Smaller padding */
            border: 1px solid #42f8f5;
            margin: 0.5rem 0;  /* Reduced margin */
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;  /* Smaller padding */
            border-bottom: 1px solid #2a4055;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-icon {
            width: 32px;  /* Smaller */
            height: 32px;  /* Smaller */
            background: #1c222d;
            border: 1px solid #42f8f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #42f8f5;
            font-size: 0.9rem;  /* Smaller */
        }

        .info-text {
            flex: 1;
        }

        .info-label {
            color: #b0c4de;
            font-size: 0.7rem;  /* Smaller */
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            color: #ffffff;
            font-size: 0.85rem;  /* Smaller */
            font-weight: 500;
        }

        .info-value a {
            color: #42f8f5;
            text-decoration: none;
        }

        .info-value a:hover {
            text-decoration: underline;
        }

        .success-message,
        .error-message {
            border-radius: 8px;
            padding: 0.6rem;  /* Smaller */
            margin-bottom: 0.8rem;  /* Reduced margin */
            text-align: center;
            display: none;
            font-size: 0.75rem;  /* Smaller */
        }

        .success-message {
            background: rgba(66, 248, 245, 0.1);
            border: 1px solid #42f8f5;
            color: #42f8f5;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff8888;
        }

        .home-link {
            display: inline-block;
            margin-top: 1rem;  /* Reduced margin */
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 6px 20px;  /* Smaller padding */
            border: 2px solid #42f8f5;
            border-radius: 30px;
            font-size: 0.85rem;  /* Smaller */
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin-top: 1rem;  /* Reduced margin */
            color: #6d8ba0;
            font-size: 0.8rem;  /* Smaller */
            text-align: center;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .contact-container {
                padding: 1.2rem;
            }
            
            .contact-header h1 {
                font-size: 1.3rem;
            }
            
            .info-row {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <!-- Header -->
        <div class="contact-header">
            <span class="contact-icon">📧</span>
            <h1>Contact Us</h1>
            <span class="contact-badge">SUPPORT</span>
        </div>

        <!-- Description -->
        <div class="contact-description">
            Have questions or suggestions? Fill out the form below.
        </div>

        <!-- Success/Error Messages -->
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i> Message sent successfully!
        </div>
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> Error sending message.
        </div>

        <!-- Contact Form -->
        <form id="contactForm">
            <label class="input-label"><i class="fas fa-user"></i> Your Name *</label>
            <input type="text" class="form-input" id="name" required placeholder="John Doe">

            <label class="input-label"><i class="fas fa-envelope"></i> Email *</label>
            <input type="email" class="form-input" id="email" required placeholder="your@email.com">

            <label class="input-label"><i class="fas fa-tag"></i> Subject</label>
            <input type="text" class="form-input" id="subject" placeholder="What's this about?">

            <label class="input-label"><i class="fas fa-comment"></i> Message *</label>
            <textarea class="form-textarea" id="message" required placeholder="Your message here..."></textarea>

            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>
        </form>

        <!-- Contact Information -->
        <div class="contact-info">
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div class="info-text">
                    <div class="info-label">Email</div>
                    <div class="info-value"><a href="mailto:contact@sgtools.in">contact@sgtools.in</a></div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-globe"></i></div>
                <div class="info-text">
                    <div class="info-label">Website</div>
                    <div class="info-value"><a href="index.html">www.sgtools.in</a></div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div style="text-align: center;">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>

        <div class="footer-email">
            📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            
            if (!name || !email || !message) {
                document.getElementById('errorMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 3000);
                return;
            }
            
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('contactForm').reset();
            
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
