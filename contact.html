<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Contact - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .contact-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Form */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-field {
            width: 100%;
            background: #12151a;
            border: 2px solid #42f8f5;
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .input-field:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .input-field::placeholder {
            color: #6d8ba0;
            font-size: 0.85rem;
        }

        textarea.input-field {
            resize: vertical;
            min-height: 100px;
        }

        .send-btn {
            width: 100%;
            background: #42f8f5;
            color: #12151a;
            border: 2px solid #42f8f5;
            border-radius: 30px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .send-btn:hover {
            background: transparent;
            color: #42f8f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        /* Email Line */
        .email-line {
            text-align: center;
            padding: 12px 0;
            border-top: 1px solid #42f8f5;
            margin-top: 5px;
        }

        .email-text {
            color: #ffffff;
            font-size: 0.9rem;
        }

        .email-text i {
            color: #42f8f5;
            margin-right: 8px;
        }

        .email-text a {
            color: #42f8f5;
            text-decoration: none;
            font-weight: 500;
        }

        .email-text a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            margin-top: 10px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .contact-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .input-field {
                padding: 10px 12px;
            }
            
            textarea.input-field {
                min-height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="contact-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">📧</span> Contact Us
            </div>
            <div class="card-badge">SUPPORT</div>
        </div>

        <!-- 4 Boxes: Name, Email, Message, Send -->
        <div class="form-container">
            <!-- Box 1: Name -->
            <input type="text" class="input-field" id="name" placeholder="Your Name" required>
            
            <!-- Box 2: Email -->
            <input type="email" class="input-field" id="email" placeholder="Your Email Address" required>
            
            <!-- Box 3: Message -->
            <textarea class="input-field" id="message" placeholder="Your Message" required></textarea>
            
            <!-- Box 4: Send Button -->
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>
        </div>

        <!-- Email Line (Under the 4 boxes) -->
        <div class="email-line">
            <span class="email-text">
                <i class="fas fa-envelope"></i> 
                <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </span>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        function sendMessage() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            
            if (!name || !email || !message) {
                alert('Please fill in all fields');
                return;
            }
            
            // Open email client
            const subject = encodeURIComponent('Contact from ' + name);
            const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);
            window.location.href = `mailto:contact@sgtools.in?subject=${subject}&body=${body}`;
            
            // Optional success message
            alert('Your email client will open. Please send to complete.');
        }
    </script>
</body>
</html>
