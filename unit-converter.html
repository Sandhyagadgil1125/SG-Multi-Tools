<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Unit Converter - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .converter-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Category Tabs */
        .category-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }

        .category-tab {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 25px;
            padding: 8px 5px;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-tab:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .category-tab.active {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .category-tab i {
            margin-right: 4px;
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 4px;
            display: block;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 4px;
        }

        .value-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            margin-bottom: 10px;
        }

        .value-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        /* Unit Row */
        .unit-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 8px 0;
        }

        .unit-select {
            flex: 1;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2342f8f5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
        }

        .unit-select:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 8px rgba(66, 248, 245, 0.3);
        }

        .swap-btn {
            width: 36px;
            height: 36px;
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 50%;
            color: #42f8f5;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 5px auto;
        }

        .swap-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: rotate(180deg);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        /* Result Display */
        .result-display {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
            text-align: center;
        }

        .result-value {
            color: #42f8f5;
            font-size: 2rem;
            font-weight: 700;
            font-family: monospace;
            line-height: 1.2;
        }

        .result-unit {
            color: #b0c4de;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .formula-text {
            color: #6d8ba0;
            font-size: 0.7rem;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #42f8f5;
        }

        /* Common Conversions */
        .common-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .common-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .common-title i {
            color: #42f8f5;
        }

        .common-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .common-btn {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 8px 5px;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .common-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .converter-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .unit-row {
                flex-direction: column;
            }
            
            .swap-btn {
                transform: rotate(90deg);
            }
            
            .swap-btn:hover {
                transform: rotate(270deg);
            }
            
            .common-grid {
                grid-template-columns: 1fr;
            }
            
            .action-grid {
                grid-template-columns: 1fr;
            }
            
            .result-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">📐</span> Unit Converter
            </div>
            <div class="card-badge">METRIC</div>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs">
            <div class="category-tab active" onclick="switchCategory('length')" id="tab-length">
                <i class="fas fa-ruler"></i> Length
            </div>
            <div class="category-tab" onclick="switchCategory('weight')" id="tab-weight">
                <i class="fas fa-weight"></i> Weight
            </div>
            <div class="category-tab" onclick="switchCategory('temperature')" id="tab-temperature">
                <i class="fas fa-thermometer-half"></i> Temperature
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-pencil-alt"></i> Value</label>
            <input class="value-input" id="value" type="number" value="1" step="any">

            <label class="input-label"><i class="fas fa-arrow-right"></i> From</label>
            <select class="unit-select" id="fromUnit"></select>

            <!-- Swap Button -->
            <div style="display: flex; justify-content: center;">
                <button class="swap-btn" onclick="swapUnits()">
                    <i class="fas fa-exchange-alt"></i>
                </button>
            </div>

            <label class="input-label"><i class="fas fa-arrow-left"></i> To</label>
            <select class="unit-select" id="toUnit"></select>
        </div>

        <!-- Result Display -->
        <div class="result-display">
            <div class="result-value" id="result">3.28084</div>
            <div class="result-unit" id="resultUnit">ft</div>
            <div class="formula-text" id="formula">1 m = 3.28084 ft</div>
        </div>

        <!-- Common Conversions -->
        <div class="common-section">
            <div class="common-title">
                <i class="fas fa-star"></i> Common Conversions
            </div>
            <div class="common-grid" id="commonConversions"></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="convert()">
                <i class="fas fa-sync-alt"></i> Convert
            </button>
            <button class="action-btn" onclick="copyResult()">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button class="action-btn" onclick="resetToDefault()">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Unit definitions
        const unitCategories = {
            length: {
                name: 'Length',
                units: {
                    'm': { name: 'Meter', factor: 1 },
                    'km': { name: 'Kilometer', factor: 1000 },
                    'cm': { name: 'Centimeter', factor: 0.01 },
                    'mm': { name: 'Millimeter', factor: 0.001 },
                    'mi': { name: 'Mile', factor: 1609.344 },
                    'yd': { name: 'Yard', factor: 0.9144 },
                    'ft': { name: 'Foot', factor: 0.3048 },
                    'in': { name: 'Inch', factor: 0.0254 },
                    'nmi': { name: 'Nautical Mile', factor: 1852 }
                }
            },
            weight: {
                name: 'Weight',
                units: {
                    'kg': { name: 'Kilogram', factor: 1 },
                    'g': { name: 'Gram', factor: 0.001 },
                    'mg': { name: 'Milligram', factor: 0.000001 },
                    'lb': { name: 'Pound', factor: 0.453592 },
                    'oz': { name: 'Ounce', factor: 0.0283495 },
                    'ton': { name: 'Metric Ton', factor: 1000 },
                    'stone': { name: 'Stone', factor: 6.35029 }
                }
            },
            temperature: {
                name: 'Temperature',
                units: {
                    'c': { name: 'Celsius', toBase: (v) => v, fromBase: (v) => v },
                    'f': { name: 'Fahrenheit', toBase: (v) => (v - 32) * 5/9, fromBase: (v) => v * 9/5 + 32 },
                    'k': { name: 'Kelvin', toBase: (v) => v - 273.15, fromBase: (v) => v + 273.15 }
                }
            }
        };

        let currentCategory = 'length';

        // Initialize units
        function updateUnitSelectors() {
            const fromSelect = document.getElementById('fromUnit');
            const toSelect = document.getElementById('toUnit');
            const category = unitCategories[currentCategory];
            
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';
            
            Object.entries(category.units).forEach(([key, unit]) => {
                const option1 = document.createElement('option');
                option1.value = key;
                option1.textContent = `${unit.name} (${key})`;
                fromSelect.appendChild(option1);
                
                const option2 = document.createElement('option');
                option2.value = key;
                option2.textContent = `${unit.name} (${key})`;
                toSelect.appendChild(option2);
            });
            
            // Set default selections
            if (currentCategory === 'length') {
                fromSelect.value = 'm';
                toSelect.value = 'ft';
            } else if (currentCategory === 'weight') {
                fromSelect.value = 'kg';
                toSelect.value = 'lb';
            } else if (currentCategory === 'temperature') {
                fromSelect.value = 'c';
                toSelect.value = 'f';
            }
            
            updateCommonConversions();
            convert();
        }

        // Switch category
        function switchCategory(category) {
            currentCategory = category;
            
            // Update active tab
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`tab-${category}`).classList.add('active');
            
            updateUnitSelectors();
        }

        // Convert function
        function convert() {
            const value = parseFloat(document.getElementById('value').value) || 0;
            const fromUnit = document.getElementById('fromUnit').value;
            const toUnit = document.getElementById('toUnit').value;
            
            let result;
            let formula = '';
            
            if (currentCategory === 'temperature') {
                // Special handling for temperature
                const fromObj = unitCategories.temperature.units[fromUnit];
                const toObj = unitCategories.temperature.units[toUnit];
                
                // Convert to Celsius first
                const celsius = fromObj.toBase(value);
                result = toObj.fromBase(celsius);
                
                formula = `${value}°${fromUnit.toUpperCase()} = ${result.toFixed(2)}°${toUnit.toUpperCase()}`;
            } else {
                // Standard conversion using factors
                const fromFactor = unitCategories[currentCategory].units[fromUnit].factor;
                const toFactor = unitCategories[currentCategory].units[toUnit].factor;
                
                result = value * fromFactor / toFactor;
                
                const factor = fromFactor / toFactor;
                formula = `Multiply by ${factor.toFixed(6)}`;
            }
            
            // Format result
            let formattedResult;
            if (Math.abs(result) < 0.001 || Math.abs(result) > 999999) {
                formattedResult = result.toExponential(6);
            } else {
                formattedResult = result.toFixed(6).replace(/\.?0+$/, '');
            }
            
            // Update display
            document.getElementById('result').textContent = formattedResult;
            document.getElementById('resultUnit').textContent = toUnit;
            document.getElementById('formula').textContent = 
                `${value} ${fromUnit} = ${formattedResult} ${toUnit}`;
        }

        // Swap units
        function swapUnits() {
            const fromSelect = document.getElementById('fromUnit');
            const toSelect = document.getElementById('toUnit');
            
            const fromValue = fromSelect.value;
            const toValue = toSelect.value;
            
            fromSelect.value = toValue;
            toSelect.value = fromValue;
            
            convert();
        }

        // Copy result
        function copyResult() {
            const resultValue = document.getElementById('result').textContent;
            const resultUnit = document.getElementById('resultUnit').textContent;
            const fromValue = document.getElementById('value').value;
            const fromUnit = document.getElementById('fromUnit').value;
            
            const text = `${fromValue} ${fromUnit} = ${resultValue} ${resultUnit}`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Result copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Reset to default
        function resetToDefault() {
            document.getElementById('value').value = '1';
            switchCategory('length');
        }

        // Update common conversions
        function updateCommonConversions() {
            const container = document.getElementById('commonConversions');
            container.innerHTML = '';
            
            const conversions = {
                length: [
                    { label: '1 m → ft', from: 'm', to: 'ft', val: 1 },
                    { label: '1 km → mi', from: 'km', to: 'mi', val: 1 },
                    { label: '1 ft → cm', from: 'ft', to: 'cm', val: 1 },
                    { label: '1 in → mm', from: 'in', to: 'mm', val: 1 }
                ],
                weight: [
                    { label: '1 kg → lb', from: 'kg', to: 'lb', val: 1 },
                    { label: '1 lb → oz', from: 'lb', to: 'oz', val: 1 },
                    { label: '1 g → oz', from: 'g', to: 'oz', val: 1 },
                    { label: '1 ton → kg', from: 'ton', to: 'kg', val: 1 }
                ],
                temperature: [
                    { label: '0°C → °F', from: 'c', to: 'f', val: 0 },
                    { label: '100°C → °F', from: 'c', to: 'f', val: 100 },
                    { label: '32°F → °C', from: 'f', to: 'c', val: 32 },
                    { label: '212°F → °C', from: 'f', to: 'c', val: 212 }
                ]
            };
            
            conversions[currentCategory].forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'common-btn';
                btn.innerHTML = item.label;
                btn.onclick = () => {
                    document.getElementById('value').value = item.val;
                    document.getElementById('fromUnit').value = item.from;
                    document.getElementById('toUnit').value = item.to;
                    convert();
                };
                container.appendChild(btn);
            });
        }

        // Event listeners
        document.getElementById('value').addEventListener('input', convert);
        document.getElementById('fromUnit').addEventListener('change', convert);
        document.getElementById('toUnit').addEventListener('change', convert);

        // Initialize
        window.addEventListener('load', () => {
            updateUnitSelectors();
        });
    </script>
</body>
</html>
