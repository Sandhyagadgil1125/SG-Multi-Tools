<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Age Calculator - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== MASTER STYLES - MATCHING INDEX.HTML THEME ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .calculator-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ===== INPUT SECTION ===== */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-icon {
            width: 40px;
            height: 40px;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #42f8f5;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .input-group {
            flex: 1;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-label i {
            color: #42f8f5;
            font-size: 0.6rem;
        }

        /* ===== CUSTOM DATE INPUT FIELDS (DD-MM-YYYY) ===== */
        .date-input-group {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .date-field {
            flex: 1;
            text-align: center;
        }

        .date-field input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 12px 5px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            text-align: center;
        }

        .date-field input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .date-field input::placeholder {
            color: #6d8ba0;
            font-size: 0.8rem;
        }

        .date-separator {
            color: #42f8f5;
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        /* ===== RESULT DISPLAY ===== */
        .result-display {
            background: #12151a;
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
            text-align: center;
        }

        .age-main {
            color: #42f8f5;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            font-family: monospace;
        }

        .age-detail {
            color: #b0c4de;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .age-breakdown {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #42f8f5;
        }

        .age-item {
            text-align: center;
        }

        .age-item-value {
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .age-item-label {
            color: #b0c4de;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* ===== ACTION BUTTONS ===== */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 12px 5px;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 5px;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* ===== ADSTERRA AD ===== */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .calculator-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .input-row {
                flex-direction: column;
                gap: 8px;
            }
            
            .input-icon {
                width: 100%;
                height: 40px;
            }
            
            .date-input-group {
                gap: 5px;
            }
            
            .date-field input {
                padding: 12px 2px;
                font-size: 0.9rem;
            }
            
            .date-separator {
                font-size: 1.2rem;
            }
            
            .age-main {
                font-size: 2rem;
            }
            
            .age-item-value {
                font-size: 1.1rem;
            }
        }

        @media screen and (max-width: 350px) {
            .date-input-group {
                flex-direction: column;
                gap: 8px;
            }
            
            .date-separator {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">📅</span> Age Calculator
            </div>
            <div class="card-badge">AGE</div>
        </div>

        <!-- Input Section - Birth Date with autocomplete="off" -->
        <div class="input-section">
            <div class="input-row">
                <div class="input-icon">🎂</div>
                <div class="input-group">
                    <div class="input-label"><i class="fas fa-circle"></i> Birth Date</div>
                    <div class="date-input-group">
                        <div class="date-field">
                            <input type="text" id="birthDay" placeholder="DD" maxlength="2" inputmode="numeric" pattern="[0-9]*" value="15" autocomplete="off">
                        </div>
                        <div class="date-separator">-</div>
                        <div class="date-field">
                            <input type="text" id="birthMonth" placeholder="MM" maxlength="2" inputmode="numeric" pattern="[0-9]*" value="01" autocomplete="off">
                        </div>
                        <div class="date-separator">-</div>
                        <div class="date-field">
                            <input type="text" id="birthYear" placeholder="YYYY" maxlength="4" inputmode="numeric" pattern="[0-9]*" value="1990" autocomplete="off">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Display -->
        <div class="result-display">
            <div class="age-main" id="ageYears">34</div>
            <div class="age-detail">Years Old</div>
            
            <div class="age-breakdown">
                <div class="age-item">
                    <div class="age-item-value" id="ageYearsDetail">34</div>
                    <div class="age-item-label">Years</div>
                </div>
                <div class="age-item">
                    <div class="age-item-value" id="ageMonths">5</div>
                    <div class="age-item-label">Months</div>
                </div>
                <div class="age-item">
                    <div class="age-item-value" id="ageDays">15</div>
                    <div class="age-item-label">Days</div>
                </div>
            </div>
        </div>

        <!-- Calculate Button -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="calculateAge()">
                <i class="fas fa-calculator"></i> Calculate Age
            </button>
        </div>

        <!-- Adsterra Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <div class="footer-email">📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a></div>
            <div class="copyright">© 2026 SG Multi Tools. All rights reserved.</div>
        </div>
    </div>

    <script>
        function calculateAge() {
            const birthDay = parseInt(document.getElementById('birthDay').value) || 1;
            const birthMonth = parseInt(document.getElementById('birthMonth').value) || 1;
            const birthYear = parseInt(document.getElementById('birthYear').value) || 2000;

            const today = new Date();
            const currentDay = today.getDate();
            const currentMonth = today.getMonth() + 1;
            const currentYear = today.getFullYear();

            const birthDate = new Date(birthYear, birthMonth - 1, birthDay);
            const currentDate = new Date(currentYear, currentMonth - 1, currentDay);

            if (birthDate > currentDate) {
                alert('Birth date cannot be in the future');
                return;
            }

            let years = currentYear - birthYear;
            let months = currentMonth - birthMonth;
            let days = currentDay - birthDay;

            if (days < 0) {
                months--;
                const lastMonth = new Date(currentYear, currentMonth - 1, 0);
                days += lastMonth.getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            document.getElementById('ageYears').textContent = years;
            document.getElementById('ageYearsDetail').textContent = years;
            document.getElementById('ageMonths').textContent = months;
            document.getElementById('ageDays').textContent = days;
        }

        // Restrict to numbers only
        document.querySelectorAll('.date-field input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });

            input.addEventListener('blur', () => {
                if (input.id.includes('Day') || input.id.includes('Month')) {
                    if (input.value.length === 1) {
                        input.value = '0' + input.value;
                    }
                }
                if (input.id.includes('Year') && input.value.length > 4) {
                    input.value = input.value.slice(0, 4);
                }
            });
        });

        window.addEventListener('load', calculateAge);
    </script>
</body>
</html>
