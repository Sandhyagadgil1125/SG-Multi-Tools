<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Age Calculator - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator-card {
            background: #1c222d;
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #42f8f5;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.8rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid #42f8f5;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #42f8f5;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: block;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 8px;
        }

        .date-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            margin-bottom: 15px;
        }

        .date-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 15px rgba(66, 248, 245, 0.3);
        }

        .date-input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* Result Display */
        .result-display {
            background: #12151a;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 2px solid #42f8f5;
            text-align: center;
        }

        .age-main {
            color: #42f8f5;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.2;
            font-family: monospace;
        }

        .age-detail {
            color: #b0c4de;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .age-breakdown {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #42f8f5;
        }

        .age-item {
            text-align: center;
        }

        .age-item-value {
            color: #42f8f5;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .age-item-label {
            color: #b0c4de;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* Next Birthday */
        .birthday-card {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .birthday-icon {
            font-size: 2rem;
            color: #42f8f5;
        }

        .birthday-info {
            flex: 1;
        }

        .birthday-label {
            color: #b0c4de;
            font-size: 0.8rem;
        }

        .birthday-date {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .birthday-days {
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .tool-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 30px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tool-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.3);
        }

        .tool-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .tool-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        .tool-btn i {
            margin-right: 8px;
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 25px;
            border: 2px solid #42f8f5;
            border-radius: 30px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 20px 0 15px;
            color: #6d8ba0;
            font-size: 0.85rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 25px 0 15px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #42f8f5;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            .calculator-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.2rem;
            }
            
            .card-icon {
                font-size: 1.5rem;
            }
            
            .card-badge {
                padding: 4px 10px;
                font-size: 0.65rem;
            }
            
            .age-main {
                font-size: 2.2rem;
            }
            
            .age-detail {
                font-size: 1rem;
            }
            
            .age-breakdown {
                gap: 5px;
            }
            
            .age-item-value {
                font-size: 1.2rem;
            }
            
            .birthday-card {
                flex-direction: column;
                text-align: center;
            }
            
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            .ad-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">📅</span> Age Calculator
            </div>
            <div class="card-badge">AGE</div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-calendar-alt"></i> Date of Birth</label>
            <input class="date-input" type="date" id="birthDate" value="1990-01-01">

            <label class="input-label"><i class="fas fa-calendar-check"></i> As of Date</label>
            <input class="date-input" type="date" id="asOfDate" value="">
        </div>

        <!-- Result Display -->
        <div class="result-display">
            <div class="age-main" id="ageYears">34</div>
            <div class="age-detail" id="ageText">34 Years Old</div>
            
            <div class="age-breakdown">
                <div class="age-item">
                    <div class="age-item-value" id="ageYearsDetail">34</div>
                    <div class="age-item-label">Years</div>
                </div>
                <div class="age-item">
                    <div class="age-item-value" id="ageMonths">5</div>
                    <div class="age-item-label">Months</div>
                </div>
                <div class="age-item">
                    <div class="age-item-value" id="ageDays">15</div>
                    <div class="age-item-label">Days</div>
                </div>
            </div>
        </div>

        <!-- Next Birthday -->
        <div class="birthday-card">
            <div class="birthday-icon">🎂</div>
            <div class="birthday-info">
                <div class="birthday-label">Next Birthday</div>
                <div class="birthday-date" id="nextBirthday">January 1, 2026</div>
            </div>
            <div class="birthday-days" id="daysUntilBirthday">305 days</div>
        </div>

        <!-- Button Grid -->
        <div class="button-grid">
            <button class="tool-btn primary" onclick="calculateAge()">
                <i class="fas fa-calculator"></i> Calculate
            </button>
            <button class="tool-btn" onclick="setToday()">
                <i class="fas fa-calendar-day"></i> Today
            </button>
            <button class="tool-btn" onclick="resetToDefault()">
                <i class="fas fa-undo"></i> Reset
            </button>
            <button class="tool-btn" onclick="shareAge()">
                <i class="fas fa-share-alt"></i> Share
            </button>
        </div>

        <!-- Adsterra Native Banner Ad - OPTION 1 (in footer) -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Set default dates
        function setDefaultDates() {
            const today = new Date();
            const asOfDate = document.getElementById('asOfDate');
            
            // Format today as YYYY-MM-DD
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            asOfDate.value = `${year}-${month}-${day}`;
        }

        // Set as of date to today
        function setToday() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById('asOfDate').value = `${year}-${month}-${day}`;
            calculateAge();
        }

        // Calculate age
        function calculateAge() {
            const birthDate = new Date(document.getElementById('birthDate').value);
            const asOfDate = new Date(document.getElementById('asOfDate').value);
            
            if (!birthDate || !asOfDate || birthDate > asOfDate) {
                alert('Please enter valid dates (Birth date must be before As of date)');
                return;
            }

            // Calculate years, months, days
            let years = asOfDate.getFullYear() - birthDate.getFullYear();
            let months = asOfDate.getMonth() - birthDate.getMonth();
            let days = asOfDate.getDate() - birthDate.getDate();

            // Adjust if days negative
            if (days < 0) {
                months--;
                const lastMonth = new Date(asOfDate.getFullYear(), asOfDate.getMonth(), 0);
                days += lastMonth.getDate();
            }

            // Adjust if months negative
            if (months < 0) {
                years--;
                months += 12;
            }

            // Update display
            document.getElementById('ageYears').textContent = years;
            document.getElementById('ageText').textContent = `${years} Years Old`;
            document.getElementById('ageYearsDetail').textContent = years;
            document.getElementById('ageMonths').textContent = months;
            document.getElementById('ageDays').textContent = days;

            // Calculate next birthday
            const nextBirthday = new Date(asOfDate.getFullYear(), birthDate.getMonth(), birthDate.getDate());
            if (nextBirthday < asOfDate) {
                nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
            }
            
            const daysUntil = Math.ceil((nextBirthday - asOfDate) / (1000 * 60 * 60 * 24));
            
            // Format next birthday
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('nextBirthday').textContent = nextBirthday.toLocaleDateString('en-US', options);
            document.getElementById('daysUntilBirthday').textContent = `${daysUntil} days`;
        }

        // Reset to default
        function resetToDefault() {
            document.getElementById('birthDate').value = '1990-01-01';
            setToday();
        }

        // Share age
        function shareAge() {
            const years = document.getElementById('ageYears').textContent;
            const months = document.getElementById('ageMonths').textContent;
            const days = document.getElementById('ageDays').textContent;
            
            const text = `I am ${years} years, ${months} months, and ${days} days old! 🎂`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'My Age',
                    text: text
                }).catch(() => {
                    alert(text);
                });
            } else {
                alert(text);
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            setDefaultDates();
            calculateAge();
        });
    </script>
</body>
</html>
