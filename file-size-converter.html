<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>File Size Converter - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .converter-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.75rem;
            margin-bottom: 5px;
            display: block;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 5px;
        }

        .value-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            margin-bottom: 12px;
        }

        .value-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        /* Unit Select Row */
        .unit-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 8px 0;
        }

        .unit-select {
            flex: 1;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2342f8f5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
        }

        .unit-select:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 8px rgba(66, 248, 245, 0.3);
        }

        .swap-btn {
            width: 36px;
            height: 36px;
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 50%;
            color: #42f8f5;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 5px auto;
        }

        .swap-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: rotate(180deg);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        /* Result Display */
        .result-display {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
            text-align: center;
        }

        .result-value {
            color: #42f8f5;
            font-size: 2rem;
            font-weight: 700;
            font-family: monospace;
            line-height: 1.2;
        }

        .result-unit {
            color: #b0c4de;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .result-detail {
            color: #6d8ba0;
            font-size: 0.75rem;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #42f8f5;
        }

        /* Common Sizes */
        .common-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .common-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .common-title i {
            color: #42f8f5;
        }

        .common-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .common-item {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 8px 3px;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .common-item:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
        }

        .common-item span {
            display: block;
            font-size: 0.6rem;
            color: #b0c4de;
        }

        .common-item:hover span {
            color: #12151a;
        }

        /* Binary/Decimal Toggle */
        .toggle-section {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            background: #12151a;
            border-radius: 30px;
            padding: 5px;
            border: 1px solid #42f8f5;
        }

        .toggle-option {
            flex: 1;
            text-align: center;
            padding: 8px 5px;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #b0c4de;
        }

        .toggle-option.active {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .toggle-option i {
            margin-right: 5px;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 5px;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .converter-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .unit-row {
                flex-direction: column;
            }
            
            .swap-btn {
                transform: rotate(90deg);
            }
            
            .swap-btn:hover {
                transform: rotate(270deg);
            }
            
            .common-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .action-grid {
                grid-template-columns: 1fr;
            }
            
            .result-value {
                font-size: 1.5rem;
            }
            
            .toggle-section {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">💾</span> File Size Converter
            </div>
            <div class="card-badge">MB/GB</div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-pencil-alt"></i> Value</label>
            <input class="value-input" id="value" type="number" value="1.00" min="0" step="0.01">

            <label class="input-label"><i class="fas fa-arrow-right"></i> From</label>
            <select class="unit-select" id="fromUnit">
                <option value="B">Bytes (B)</option>
                <option value="KB">Kilobytes (KB)</option>
                <option value="MB" selected>Megabytes (MB)</option>
                <option value="GB">Gigabytes (GB)</option>
                <option value="TB">Terabytes (TB)</option>
                <option value="PB">Petabytes (PB)</option>
            </select>

            <!-- Swap Button -->
            <div style="display: flex; justify-content: center;">
                <button class="swap-btn" onclick="swapUnits()">
                    <i class="fas fa-exchange-alt"></i>
                </button>
            </div>

            <label class="input-label"><i class="fas fa-arrow-left"></i> To</label>
            <select class="unit-select" id="toUnit">
                <option value="B">Bytes (B)</option>
                <option value="KB">Kilobytes (KB)</option>
                <option value="MB">Megabytes (MB)</option>
                <option value="GB" selected>Gigabytes (GB)</option>
                <option value="TB">Terabytes (TB)</option>
                <option value="PB">Petabytes (PB)</option>
            </select>
        </div>

        <!-- Binary/Decimal Toggle -->
        <div class="toggle-section" id="unitSystem">
            <div class="toggle-option active" onclick="setDecimal(true)" id="decimalOpt">
                <i class="fas fa-divide"></i> Decimal (1000)
            </div>
            <div class="toggle-option" onclick="setDecimal(false)" id="binaryOpt">
                <i class="fas fa-square-root-alt"></i> Binary (1024)
            </div>
        </div>

        <!-- Result Display -->
        <div class="result-display">
            <div class="result-value" id="result">0.001</div>
            <div class="result-unit" id="resultUnit">GB</div>
            <div class="result-detail" id="resultDetail">1 MB = 0.001 GB (Decimal)</div>
        </div>

        <!-- Common File Sizes -->
        <div class="common-section">
            <div class="common-title">
                <i class="fas fa-star"></i> Common File Sizes
            </div>
            <div class="common-grid" id="commonSizes">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="convert()">
                <i class="fas fa-sync-alt"></i> Convert
            </button>
            <button class="action-btn" onclick="swapUnits()">
                <i class="fas fa-exchange-alt"></i> Swap
            </button>
            <button class="action-btn" onclick="copyResult()">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Unit definitions
        const units = ['B', 'KB', 'MB', 'GB', 'TB', 'PB'];
        
        // System type
        let useDecimal = true; // true = 1000, false = 1024

        // Common file sizes examples
        const commonExamples = [
            { name: 'Text File', size: 50, unit: 'KB' },
            { name: 'Photo', size: 3, unit: 'MB' },
            { name: 'MP3 Song', size: 5, unit: 'MB' },
            { name: 'HD Movie', size: 4, unit: 'GB' },
            { name: 'Game', size: 50, unit: 'GB' },
            { name: 'Backup', size: 1, unit: 'TB' }
        ];

        // Initialize
        function init() {
            renderCommonSizes();
            convert();
        }

        // Set decimal/binary system
        function setDecimal(isDecimal) {
            useDecimal = isDecimal;
            
            // Update toggle UI
            document.getElementById('decimalOpt').classList.toggle('active', isDecimal);
            document.getElementById('binaryOpt').classList.toggle('active', !isDecimal);
            
            convert();
        }

        // Convert function
        function convert() {
            const value = parseFloat(document.getElementById('value').value) || 0;
            const fromUnit = document.getElementById('fromUnit').value;
            const toUnit = document.getElementById('toUnit').value;
            
            // Get base factor
            const base = useDecimal ? 1000 : 1024;
            
            // Convert to bytes first
            const fromIndex = units.indexOf(fromUnit);
            const toIndex = units.indexOf(toUnit);
            
            let bytes = value * Math.pow(base, fromIndex);
            let result = bytes / Math.pow(base, toIndex);
            
            // Format result
            let formattedResult;
            if (Math.abs(result) < 0.001 || Math.abs(result) > 999999) {
                formattedResult = result.toExponential(4);
            } else {
                formattedResult = result.toFixed(6).replace(/\.?0+$/, '');
            }
            
            // Update display
            document.getElementById('result').textContent = formattedResult;
            document.getElementById('resultUnit').textContent = toUnit;
            
            // Update detail text
            const system = useDecimal ? 'Decimal (1000)' : 'Binary (1024)';
            document.getElementById('resultDetail').textContent = 
                `${value} ${fromUnit} = ${formattedResult} ${toUnit} (${system})`;
        }

        // Swap units
        function swapUnits() {
            const fromSelect = document.getElementById('fromUnit');
            const toSelect = document.getElementById('toUnit');
            
            const fromValue = fromSelect.value;
            const toValue = toSelect.value;
            
            fromSelect.value = toValue;
            toSelect.value = fromValue;
            
            convert();
        }

        // Copy result
        function copyResult() {
            const result = document.getElementById('result').textContent;
            const fromUnit = document.getElementById('fromUnit').value;
            const toUnit = document.getElementById('toUnit').value;
            const value = document.getElementById('value').value;
            
            const text = `${value} ${fromUnit} = ${result} ${toUnit}`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Result copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Set example
        function setExample(size, unit) {
            document.getElementById('value').value = size;
            document.getElementById('fromUnit').value = unit;
            convert();
        }

        // Render common sizes
        function renderCommonSizes() {
            const container = document.getElementById('commonSizes');
            container.innerHTML = '';
            
            commonExamples.forEach(example => {
                const item = document.createElement('div');
                item.className = 'common-item';
                item.onclick = () => setExample(example.size, example.unit);
                item.innerHTML = `
                    ${example.name}
                    <span>${example.size} ${example.unit}</span>
                `;
                container.appendChild(item);
            });
        }

        // Event listeners
        document.getElementById('value').addEventListener('input', convert);
        document.getElementById('fromUnit').addEventListener('change', convert);
        document.getElementById('toUnit').addEventListener('change', convert);

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
