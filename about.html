<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99 !important;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .about-container {
            max-width: 640px;
            width: 100%;
            background: #1c222d;  /* Dark card background */
            border-radius: 18px;
            padding: 2.5rem;
            border: 2px solid #42f8f5;  /* Cyan border */
            box-shadow: 0 0 25px rgba(66, 248, 245, 0.2);
        }

        .about-container h1 {
            color: #42f8f5;  /* Cyan heading */
            font-size: 2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #42f8f5;
            padding-bottom: 10px;
        }

        .about-container h2 {
            color: #ffffff;  /* White subheading */
            font-size: 1.3rem;
            margin: 1.5rem 0 1rem;
        }

        .about-container p {
            color: #c5d1de;  /* Light grey text */
            font-size: 1rem;
            line-height: 1.6;
            margin: 1rem 0;
        }

        .about-container ul {
            color: #c5d1de;
            margin-left: 1.5rem;
            line-height: 1.8;
        }

        .about-container li {
            color: #c5d1de;
            margin-bottom: 0.5rem;
        }

        .back-home {
            display: inline-block;
            margin-top: 2rem;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 25px;
            border: 2px solid #42f8f5;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .back-home:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        @media (max-width: 500px) {
            .about-container {
                padding: 1.5rem;
            }
            
            .about-container h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="about-container">
        <h1>About SG Multi Tools</h1>
        <p>SG Multi Tools is a free online multi-tool platform designed to make everyday digital tasks simple, fast, and accessible.</p>
        
        <h2>What We Offer</h2>
        <ul>
            <li>Calculators & financial tools</li>
            <li>Text & productivity utilities</li>
            <li>Image & file tools</li>
            <li>Conversion & web utilities</li>
        </ul>

        <div style="text-align: center;">
            <a href="index.html" class="back-home">← Back to Home</a>
        </div>
    </div>
</body>
</html>
