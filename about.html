<!DOCTYPE html>

<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        body {
            background: #FAF0E6;  /* Warm champagne */

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .about-container {
            max-width: 640px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }

        .about-container h1 {

            font-size: 2rem;
            margin-bottom: 0.5rem;
            border-bottom: 2px solid #42f8f5;

            display: inline-block;
            margin-top: 1.5rem;

            padding: 8px 22px;

            border-radius: 30px;
