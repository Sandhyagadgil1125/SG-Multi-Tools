<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Image Converter - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .converter-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Upload Area */
        .upload-area {
            background: #12151a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px dashed #42f8f5;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: #1e2b37;
            border-color: #42f8f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.2);
        }

        .upload-icon {
            font-size: 2.5rem;
            color: #42f8f5;
            margin-bottom: 10px;
        }

        .upload-text {
            color: white;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #b0c4de;
            font-size: 0.75rem;
        }

        .file-info {
            display: none;
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #42f8f5;
        }

        .file-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #b0c4de;
            font-size: 0.8rem;
        }

        .file-info-row span {
            color: #42f8f5;
            font-weight: 600;
        }

        /* Preview Section */
        .preview-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }

        .preview-box {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        .preview-title {
            color: #b0c4de;
            font-size: 0.75rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .preview-title i {
            color: #42f8f5;
        }

        .image-preview {
            width: 100%;
            height: 100px;
            background: #1e2b37;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b0c4de;
            font-size: 0.8rem;
            border: 1px solid #42f8f5;
            overflow: hidden;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .preview-size {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-top: 5px;
            text-align: center;
        }

        /* Format Selection */
        .format-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .format-title {
            color: white;
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .format-title i {
            color: #42f8f5;
        }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .format-option {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px 5px;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .format-option:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .format-option.active {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .format-option i {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        /* Quality Slider */
        .quality-section {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #42f8f5;
        }

        .quality-header {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .quality-header span {
            color: #42f8f5;
        }

        .quality-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #1e2b37;
            outline: none;
            -webkit-appearance: none;
        }

        .quality-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #42f8f5;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(66, 248, 245, 0.4);
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 12px 5px;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 5px;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .converter-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .preview-section {
                grid-template-columns: 1fr;
            }
            
            .format-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .action-grid {
                grid-template-columns: 1fr;
            }
            
            .upload-icon {
                font-size: 2rem;
            }
            
            .upload-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">🖼️</span> Image Converter
            </div>
            <div class="card-badge">PNG/JPG</div>
        </div>

        <!-- Upload Area -->
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to upload or drag and drop</div>
            <div class="upload-hint">Supports: JPG, PNG, GIF, BMP, WEBP</div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(this)">
        </div>

        <!-- File Info (hidden by default) -->
        <div class="file-info" id="fileInfo">
            <div class="file-info-row">
                <span>File Name:</span>
                <span id="fileName">-</span>
            </div>
            <div class="file-info-row">
                <span>File Size:</span>
                <span id="fileSize">-</span>
            </div>
            <div class="file-info-row">
                <span>Dimensions:</span>
                <span id="fileDimensions">-</span>
            </div>
            <div class="file-info-row">
                <span>Format:</span>
                <span id="fileFormat">-</span>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section" id="previewSection" style="display: none;">
            <div class="preview-box">
                <div class="preview-title"><i class="fas fa-image"></i> Original</div>
                <div class="image-preview" id="originalPreview"></div>
                <div class="preview-size" id="originalSize">-</div>
            </div>
            <div class="preview-box">
                <div class="preview-title"><i class="fas fa-sync-alt"></i> Converted</div>
                <div class="image-preview" id="convertedPreview"></div>
                <div class="preview-size" id="convertedSize">-</div>
            </div>
        </div>

        <!-- Format Selection -->
        <div class="format-section">
            <div class="format-title"><i class="fas fa-exchange-alt"></i> Convert to</div>
            <div class="format-grid">
                <div class="format-option active" onclick="selectFormat('png')" id="formatPNG">
                    <i class="fas fa-image"></i> PNG
                </div>
                <div class="format-option" onclick="selectFormat('jpg')" id="formatJPG">
                    <i class="fas fa-image"></i> JPG
                </div>
                <div class="format-option" onclick="selectFormat('gif')" id="formatGIF">
                    <i class="fas fa-image"></i> GIF
                </div>
                <div class="format-option" onclick="selectFormat('bmp')" id="formatBMP">
                    <i class="fas fa-image"></i> BMP
                </div>
                <div class="format-option" onclick="selectFormat('webp')" id="formatWEBP">
                    <i class="fas fa-image"></i> WEBP
                </div>
                <div class="format-option" onclick="selectFormat('ico')" id="formatICO">
                    <i class="fas fa-image"></i> ICO
                </div>
            </div>
        </div>

        <!-- Quality Slider (for JPG/WEBP) -->
        <div class="quality-section" id="qualitySection">
            <div class="quality-header">
                <span>Quality</span>
                <span id="qualityValue">90%</span>
            </div>
            <input type="range" class="quality-slider" id="qualitySlider" min="1" max="100" value="90" oninput="updateQuality()">
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="convertImage()" id="convertBtn" disabled>
                <i class="fas fa-sync-alt"></i> Convert
            </button>
            <button class="action-btn" onclick="downloadImage()" id="downloadBtn" disabled>
                <i class="fas fa-download"></i> Download
            </button>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let selectedFile = null;
        let originalImage = null;
        let convertedImageData = null;
        let currentFormat = 'png';
        let quality = 90;

        // Format selection
        function selectFormat(format) {
            currentFormat = format;
            
            // Update active state
            document.querySelectorAll('.format-option').forEach(opt => {
                opt.classList.remove('active');
            });
            document.getElementById(`format${format.toUpperCase()}`).classList.add('active');
            
            // Show/hide quality slider based on format
            const qualitySection = document.getElementById('qualitySection');
            if (format === 'jpg' || format === 'webp') {
                qualitySection.style.display = 'block';
            } else {
                qualitySection.style.display = 'none';
            }
        }

        // Update quality value
        function updateQuality() {
            quality = document.getElementById('qualitySlider').value;
            document.getElementById('qualityValue').textContent = quality + '%';
        }

        // Handle file selection
        function handleFileSelect(input) {
            const file = input.files[0];
            if (!file) return;
            
            selectedFile = file;
            
            // Display file info
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            document.getElementById('fileFormat').textContent = file.type || 'Unknown';
            
            // Read image dimensions
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                    document.getElementById('fileDimensions').textContent = `${img.width} x ${img.height}`;
                    
                    // Show preview
                    document.getElementById('previewSection').style.display = 'grid';
                    document.getElementById('originalPreview').innerHTML = `<img src="${e.target.result}" alt="Original">`;
                    document.getElementById('originalSize').textContent = formatFileSize(file.size);
                    
                    // Enable convert button
                    document.getElementById('convertBtn').disabled = false;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Convert image
        function convertImage() {
            if (!originalImage) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(originalImage, 0, 0);
            
            // Convert based on format
            let mimeType;
            switch(currentFormat) {
                case 'png':
                    mimeType = 'image/png';
                    break;
                case 'jpg':
                    mimeType = 'image/jpeg';
                    break;
                case 'gif':
                    mimeType = 'image/gif';
                    break;
                case 'bmp':
                    mimeType = 'image/bmp';
                    break;
                case 'webp':
                    mimeType = 'image/webp';
                    break;
                case 'ico':
                    mimeType = 'image/x-icon';
                    break;
                default:
                    mimeType = 'image/png';
            }
            
            // For JPG, apply quality
            let qualityParam;
            if (currentFormat === 'jpg' || currentFormat === 'webp') {
                qualityParam = quality / 100;
            } else {
                qualityParam = undefined;
            }
            
            convertedImageData = canvas.toDataURL(mimeType, qualityParam);
            
            // Show converted preview
            document.getElementById('convertedPreview').innerHTML = `<img src="${convertedImageData}" alt="Converted">`;
            
            // Calculate converted size
            const base64Length = convertedImageData.length - 'data:image/png;base64,'.length;
            const sizeInBytes = Math.ceil(base64Length * 0.75); // Approximate size
            document.getElementById('convertedSize').textContent = formatFileSize(sizeInBytes);
            
            // Enable download button
            document.getElementById('downloadBtn').disabled = false;
        }

        // Download converted image
        function downloadImage() {
            if (!convertedImageData) return;
            
            const link = document.createElement('a');
            link.download = `converted.${currentFormat}`;
            link.href = convertedImageData;
            link.click();
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Drag and drop support
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#42f8f5';
            uploadArea.style.background = '#1e2b37';
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#42f8f5';
            uploadArea.style.background = '#12151a';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#42f8f5';
            uploadArea.style.background = '#12151a';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('fileInput').files = e.dataTransfer.files;
                handleFileSelect(document.getElementById('fileInput'));
            } else {
                alert('Please drop an image file');
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            selectFormat('png');
        });
    </script>
</body>
</html>
