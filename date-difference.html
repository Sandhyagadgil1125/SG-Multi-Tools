<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Date Difference - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .date-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .date-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .date-field {
            flex: 1;
        }

        .date-label {
            color: #b0c4de;
            font-size: 0.75rem;
            margin-bottom: 5px;
            display: block;
        }

        .date-label i {
            color: #42f8f5;
            margin-right: 5px;
        }

        .date-input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .date-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .date-input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* Quick Select Buttons */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 10px 0;
        }

        .quick-btn {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 6px 3px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .quick-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        /* Result Display */
        .result-display {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
        }

        .main-result {
            text-align: center;
            margin-bottom: 15px;
        }

        .main-number {
            color: #42f8f5;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .main-label {
            color: #b0c4de;
            font-size: 0.9rem;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #42f8f5;
        }

        .detail-item {
            text-align: center;
        }

        .detail-number {
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .detail-label {
            color: #b0c4de;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* Additional Info */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .info-card {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        .info-title {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-title i {
            color: #42f8f5;
        }

        .info-value {
            color: white;
            font-size: 0.9rem;
        }

        .info-value span {
            color: #42f8f5;
            font-weight: 600;
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 5px;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .date-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .date-row {
                flex-direction: column;
                gap: 10px;
            }
            
            .quick-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .detail-grid {
                grid-template-columns: 1fr;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .action-grid {
                grid-template-columns: 1fr;
            }
            
            .main-number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="date-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">📆</span> Date Difference
            </div>
            <div class="card-badge">DAYS</div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="date-row">
                <div class="date-field">
                    <label class="date-label"><i class="fas fa-calendar-alt"></i> Start Date</label>
                    <input class="date-input" type="date" id="startDate">
                </div>
                <div class="date-field">
                    <label class="date-label"><i class="fas fa-calendar-check"></i> End Date</label>
                    <input class="date-input" type="date" id="endDate">
                </div>
            </div>

            <!-- Quick Select Buttons -->
            <div class="quick-grid">
                <button class="quick-btn" onclick="setToday()">Today</button>
                <button class="quick-btn" onclick="setTomorrow()">Tomorrow</button>
                <button class="quick-btn" onclick="setNextWeek()">Next Week</button>
                <button class="quick-btn" onclick="setNextMonth()">Next Month</button>
                <button class="quick-btn" onclick="setNextYear()">Next Year</button>
                <button class="quick-btn" onclick="setLastWeek()">Last Week</button>
                <button class="quick-btn" onclick="setLastMonth()">Last Month</button>
                <button class="quick-btn" onclick="setLastYear()">Last Year</button>
            </div>
        </div>

        <!-- Main Result -->
        <div class="result-display">
            <div class="main-result">
                <div class="main-number" id="totalDays">0</div>
                <div class="main-label">Total Days Difference</div>
            </div>

            <div class="detail-grid">
                <div class="detail-item">
                    <div class="detail-number" id="years">0</div>
                    <div class="detail-label">Years</div>
                </div>
                <div class="detail-item">
                    <div class="detail-number" id="months">0</div>
                    <div class="detail-label">Months</div>
                </div>
                <div class="detail-item">
                    <div class="detail-number" id="days">0</div>
                    <div class="detail-label">Days</div>
                </div>
            </div>
        </div>

        <!-- Additional Info -->
        <div class="info-grid">
            <div class="info-card">
                <div class="info-title"><i class="fas fa-clock"></i> In Hours</div>
                <div class="info-value"><span id="hours">0</span> hours</div>
            </div>
            <div class="info-card">
                <div class="info-title"><i class="fas fa-clock"></i> In Minutes</div>
                <div class="info-value"><span id="minutes">0</span> minutes</div>
            </div>
            <div class="info-card">
                <div class="info-title"><i class="fas fa-calendar-week"></i> In Weeks</div>
                <div class="info-value"><span id="weeks">0</span> weeks</div>
            </div>
            <div class="info-card">
                <div class="info-title"><i class="fas fa-calendar-day"></i> Weekdays</div>
                <div class="info-value"><span id="weekdays">0</span> days</div>
            </div>
            <div class="info-card">
                <div class="info-title"><i class="fas fa-umbrella-beach"></i> Weekends</div>
                <div class="info-value"><span id="weekends">0</span> days</div>
            </div>
            <div class="info-card">
                <div class="info-title"><i class="fas fa-hourglass-half"></i> % of Year</div>
                <div class="info-value"><span id="percentOfYear">0</span>%</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-grid">
            <button class="action-btn primary" onclick="calculateDifference()">
                <i class="fas fa-calculator"></i> Calculate
            </button>
            <button class="action-btn" onclick="swapDates()">
                <i class="fas fa-exchange-alt"></i> Swap
            </button>
            <button class="action-btn" onclick="copyResult()">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Set default dates
        function setDefaultDates() {
            const today = new Date();
            const startDate = document.getElementById('startDate');
            const endDate = document.getElementById('endDate');
            
            // Format today as YYYY-MM-DD
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            
            // Set start date to today
            startDate.value = `${year}-${month}-${day}`;
            
            // Set end date to today + 7 days
            const nextWeek = new Date(today);
            nextWeek.setDate(today.getDate() + 7);
            const endYear = nextWeek.getFullYear();
            const endMonth = String(nextWeek.getMonth() + 1).padStart(2, '0');
            const endDay = String(nextWeek.getDate()).padStart(2, '0');
            endDate.value = `${endYear}-${endMonth}-${endDay}`;
        }

        // Set to today
        function setToday() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            
            if (event.target.closest('.quick-btn')) {
                // If called from a button, we need to know which date to set
                const btnText = event.target.textContent;
                if (btnText === 'Today') {
                    document.getElementById('startDate').value = `${year}-${month}-${day}`;
                }
            }
            calculateDifference();
        }

        function setTomorrow() {
            const date = new Date();
            date.setDate(date.getDate() + 1);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            document.getElementById('endDate').value = `${year}-${month}-${day}`;
            calculateDifference();
        }

        function setNextWeek() {
            const date = new Date();
            date.setDate(date.getDate() + 7);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            document.getElementById('endDate').value = `${year}-${month}-${day}`;
            calculateDifference();
        }

        function setNextMonth() {
            const date = new Date();
            date.setMonth(date.getMonth() + 1);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            document.getElementById('endDate').value = `${year}-${month}-${day}`;
            calculateDifference();
        }

        function setNextYear() {
            const date = new Date();
            date.setFullYear(date.getFullYear() + 1);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            document.getElementById('endDate').value = `${year}-${month}-${day}`;
            calculateDifference();
        }

        function setLastWeek() {
            const date = new Date();
            date.setDate(date.getDate() - 7);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            document.getElementById('startDate').value = `${year}-${month}-${day}`;
            calculateDifference();
        }

        function setLastMonth() {
            const date = new Date();
            date.setMonth(date.getMonth() - 1);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            document.getElementById('startDate').value = `${year}-${month}-${day}`;
            calculateDifference();
        }

        function setLastYear() {
            const date = new Date();
            date.setFullYear(date.getFullYear() - 1);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            document.getElementById('startDate').value = `${year}-${month}-${day}`;
            calculateDifference();
        }

        // Calculate date difference
        function calculateDifference() {
            const startDate = new Date(document.getElementById('startDate').value);
            const endDate = new Date(document.getElementById('endDate').value);
            
            if (!startDate || !endDate) {
                alert('Please select both dates');
                return;
            }

            // Calculate total days
            const diffTime = Math.abs(endDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            // Calculate years, months, days
            let years = endDate.getFullYear() - startDate.getFullYear();
            let months = endDate.getMonth() - startDate.getMonth();
            let days = endDate.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                const lastMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 0);
                days += lastMonth.getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            // Calculate additional info
            const hours = diffDays * 24;
            const minutes = hours * 60;
            const weeks = (diffDays / 7).toFixed(1);
            
            // Calculate weekdays and weekends
            let weekdays = 0;
            let weekends = 0;
            let currentDate = new Date(startDate);
            
            while (currentDate <= endDate) {
                const dayOfWeek = currentDate.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    weekends++;
                } else {
                    weekdays++;
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }

            // Calculate percentage of year
            const daysInYear = (endDate.getFullYear() % 4 === 0) ? 366 : 365;
            const percentOfYear = ((diffDays / daysInYear) * 100).toFixed(1);

            // Update displays
            document.getElementById('totalDays').textContent = diffDays;
            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours.toLocaleString();
            document.getElementById('minutes').textContent = minutes.toLocaleString();
            document.getElementById('weeks').textContent = weeks;
            document.getElementById('weekdays').textContent = weekdays;
            document.getElementById('weekends').textContent = weekends;
            document.getElementById('percentOfYear').textContent = percentOfYear;
        }

        // Swap dates
        function swapDates() {
            const startDate = document.getElementById('startDate');
            const endDate = document.getElementById('endDate');
            
            const temp = startDate.value;
            startDate.value = endDate.value;
            endDate.value = temp;
            
            calculateDifference();
        }

        // Copy result
        function copyResult() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const totalDays = document.getElementById('totalDays').textContent;
            const years = document.getElementById('years').textContent;
            const months = document.getElementById('months').textContent;
            const days = document.getElementById('days').textContent;
            
            const text = `From ${startDate} to ${endDate}: ${totalDays} total days (${years} years, ${months} months, ${days} days)`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Result copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        // Initialize
        window.addEventListener('load', () => {
            setDefaultDates();
            calculateDifference();
        });
    </script>
</body>
</html>
