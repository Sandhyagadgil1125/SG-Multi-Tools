<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Date Difference - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .date-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 550px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
            display: inline-block;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #42f8f5;
        }

        .date-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .date-field {
            flex: 1;
        }

        .date-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 5px;
            display: block;
        }

        .date-label i {
            color: #42f8f5;
            margin-right: 5px;
        }

        .date-input-group {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        .date-part {
            flex: 1;
            text-align: center;
        }

        .date-part input {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 8px;
            padding: 10px 2px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            text-align: center;
        }

        .date-part input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .date-part input::placeholder {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        .date-separator {
            color: #42f8f5;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 10px 0;
        }

        .quick-btn {
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 8px 3px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .quick-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
        }

        .result-display {
            background: #12151a;
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #42f8f5;
        }

        .main-result {
            text-align: center;
            margin-bottom: 15px;
        }

        .main-number {
            color: #42f8f5;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            font-family: monospace;
        }

        .main-label {
            color: #b0c4de;
            font-size: 0.9rem;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #42f8f5;
        }

        .detail-item {
            text-align: center;
        }

        .detail-number {
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .detail-label {
            color: #b0c4de;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .action-btn i {
            margin-right: 3px;
        }

        .action-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        @media screen and (max-width: 500px) {
            body { padding: 10px; }
            .date-card { padding: 15px; }
            .card-title { font-size: 1.1rem; }
            .card-icon { font-size: 1.3rem; display: inline-block; }
            .date-row { flex-direction: column; gap: 10px; }
            .quick-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-grid { grid-template-columns: 1fr; }
            .action-grid { grid-template-columns: 1fr; }
            .main-number { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="date-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">⏳</span> Date Difference
            </div>
            <div class="card-badge">DAYS</div>
        </div>

        <div class="input-section">
            <!-- Start Date -->
            <div class="date-row">
                <div class="date-field">
                    <div class="date-label"><i class="fas fa-calendar-alt"></i> Start Date</div>
                    <div class="date-input-group">
                        <div class="date-part">
                            <input type="text" id="startDay" placeholder="DD" maxlength="2" inputmode="numeric" pattern="[0-9]*" value="01" readonly onfocus="this.removeAttribute('readonly')">
                        </div>
                        <div class="date-separator">-</div>
                        <div class="date-part">
                            <input type="text" id="startMonth" placeholder="MM" maxlength="2" inputmode="numeric" pattern="[0-9]*" value="01" readonly onfocus="this.removeAttribute('readonly')">
                        </div>
                        <div class="date-separator">-</div>
                        <div class="date-part">
                            <input type="text" id="startYear" placeholder="YYYY" maxlength="4" inputmode="numeric" pattern="[0-9]*" value="2026" readonly onfocus="this.removeAttribute('readonly')">
                        </div>
                    </div>
                </div>
            </div>

            <!-- End Date -->
            <div class="date-row">
                <div class="date-field">
                    <div class="date-label"><i class="fas fa-calendar-check"></i> End Date</div>
                    <div class="date-input-group">
                        <div class="date-part">
                            <input type="text" id="endDay" placeholder="DD" maxlength="2" inputmode="numeric" pattern="[0-9]*" value="08" readonly onfocus="this.removeAttribute('readonly')">
                        </div>
                        <div class="date-separator">-</div>
                        <div class="date-part">
                            <input type="text" id="endMonth" placeholder="MM" maxlength="2" inputmode="numeric" pattern="[0-9]*" value="03" readonly onfocus="this.removeAttribute('readonly')">
                        </div>
                        <div class="date-separator">-</div>
                        <div class="date-part">
                            <input type="text" id="endYear" placeholder="YYYY" maxlength="4" inputmode="numeric" pattern="[0-9]*" value="2026" readonly onfocus="this.removeAttribute('readonly')">
                        </div>
                    </div>
                </div>
            </div>

            <div class="quick-grid">
                <button class="quick-btn" onclick="setToday()">Today</button>
                <button class="quick-btn" onclick="setTomorrow()">Tomorrow</button>
                <button class="quick-btn" onclick="setNextWeek()">+7 days</button>
                <button class="quick-btn" onclick="setNextMonth()">+1 month</button>
            </div>
        </div>

        <div class="result-display">
            <div class="main-result">
                <div class="main-number" id="totalDays">7</div>
                <div class="main-label">Total Days Difference</div>
            </div>
            <div class="detail-grid">
                <div class="detail-item">
                    <div class="detail-number" id="years">0</div>
                    <div class="detail-label">Years</div>
                </div>
                <div class="detail-item">
                    <div class="detail-number" id="months">0</div>
                    <div class="detail-label">Months</div>
                </div>
                <div class="detail-item">
                    <div class="detail-number" id="days">7</div>
                    <div class="detail-label">Days</div>
                </div>
            </div>
        </div>

        <div class="action-grid">
            <button class="action-btn primary" onclick="calculateDifference()"><i class="fas fa-calculator"></i> Calculate</button>
            <button class="action-btn" onclick="swapDates()"><i class="fas fa-exchange-alt"></i> Swap</button>
            <button class="action-btn" onclick="copyResult()"><i class="fas fa-copy"></i> Copy</button>
        </div>

        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <div class="footer">
            <a href="index.html" class="home-link"><i class="fas fa-home"></i> Back to Home</a>
            <div class="footer-email">📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a></div>
            <div class="copyright">© 2026 SG Multi Tools. All rights reserved.</div>
        </div>
    </div>

    <script>
        // Force remove any autofill on page load
        window.addEventListener('load', function() {
            // Set all date inputs to readonly initially
            const dateInputs = document.querySelectorAll('.date-part input');
            dateInputs.forEach(input => {
                input.setAttribute('readonly', true);
                // Remove readonly when clicked/tapped
                input.addEventListener('click', function() {
                    this.removeAttribute('readonly');
                });
                input.addEventListener('touchstart', function() {
                    this.removeAttribute('readonly');
                });
                input.addEventListener('focus', function() {
                    this.removeAttribute('readonly');
                });
            });
        });

        function setToday() {
            const today = new Date();
            document.getElementById('startDay').value = String(today.getDate()).padStart(2, '0');
            document.getElementById('startMonth').value = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('startYear').value = today.getFullYear();
            calculateDifference();
        }

        function setTomorrow() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('endDay').value = String(tomorrow.getDate()).padStart(2, '0');
            document.getElementById('endMonth').value = String(tomorrow.getMonth() + 1).padStart(2, '0');
            document.getElementById('endYear').value = tomorrow.getFullYear();
            calculateDifference();
        }

        function setNextWeek() {
            const nextWeek = new Date();
            nextWeek.setDate(nextWeek.getDate() + 7);
            document.getElementById('endDay').value = String(nextWeek.getDate()).padStart(2, '0');
            document.getElementById('endMonth').value = String(nextWeek.getMonth() + 1).padStart(2, '0');
            document.getElementById('endYear').value = nextWeek.getFullYear();
            calculateDifference();
        }

        function setNextMonth() {
            const nextMonth = new Date();
            nextMonth.setMonth(nextMonth.getMonth() + 1);
            document.getElementById('endDay').value = String(nextMonth.getDate()).padStart(2, '0');
            document.getElementById('endMonth').value = String(nextMonth.getMonth() + 1).padStart(2, '0');
            document.getElementById('endYear').value = nextMonth.getFullYear();
            calculateDifference();
        }

        function calculateDifference() {
            const startDay = parseInt(document.getElementById('startDay').value) || 1;
            const startMonth = parseInt(document.getElementById('startMonth').value) || 1;
            const startYear = parseInt(document.getElementById('startYear').value) || 2000;
            
            const endDay = parseInt(document.getElementById('endDay').value) || 1;
            const endMonth = parseInt(document.getElementById('endMonth').value) || 1;
            const endYear = parseInt(document.getElementById('endYear').value) || 2000;

            const startDate = new Date(startYear, startMonth - 1, startDay);
            const endDate = new Date(endYear, endMonth - 1, endDay);

            const diffTime = Math.abs(endDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let years = endYear - startYear;
            let months = endMonth - startMonth;
            let days = endDay - startDay;

            if (days < 0) {
                months--;
                const lastMonth = new Date(endYear, endMonth - 1, 0);
                days += lastMonth.getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            document.getElementById('totalDays').textContent = diffDays;
            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = days;
        }

        function swapDates() {
            const startDay = document.getElementById('startDay').value;
            const startMonth = document.getElementById('startMonth').value;
            const startYear = document.getElementById('startYear').value;
            const endDay = document.getElementById('endDay').value;
            const endMonth = document.getElementById('endMonth').value;
            const endYear = document.getElementById('endYear').value;
            
            document.getElementById('startDay').value = endDay;
            document.getElementById('startMonth').value = endMonth;
            document.getElementById('startYear').value = endYear;
            document.getElementById('endDay').value = startDay;
            document.getElementById('endMonth').value = startMonth;
            document.getElementById('endYear').value = startYear;
            
            calculateDifference();
        }

        function copyResult() {
            const totalDays = document.getElementById('totalDays').textContent;
            const years = document.getElementById('years').textContent;
            const months = document.getElementById('months').textContent;
            const days = document.getElementById('days').textContent;
            
            const text = `Date Difference: ${totalDays} total days (${years} years, ${months} months, ${days} days)`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Result copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        document.querySelectorAll('.date-part input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        window.addEventListener('load', () => {
            setToday();
            setTomorrow();
        });
    </script>
</body>
</html>
