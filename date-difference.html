<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Date Difference - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;  /* Light gold background */
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .tool-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 1.2rem;
            background: #1c222d;
            border-radius: 18px;
            border: 2px solid #42f8f5;
            box-shadow: 0 0 20px rgba(66, 248, 245, 0.3);
        }
        
        .tool-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            border-bottom: 2px solid #42f8f5;
            padding-bottom: 8px;
        }
        
        .tool-icon {
            font-size: 1.8rem;
            color: #42f8f5;
        }
        
        .tool-header h1 {
            color: #42f8f5;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .tool-badge {
            background: #12151a;
            color: #42f8f5;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 30px;
            border: 1px solid #42f8f5;
            margin-left: auto;
            text-transform: uppercase;
        }

        /* Description - Hidden on mobile */
        .mobile-hide {
            display: block;
            color: #c5d1de;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .input-label {
            display: block;
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 5px;
            width: 16px;
        }

        .tool-input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #eef5fa;
            border: 2px solid #3d5a73;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #1c222d;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
            margin-bottom: 0.8rem;
        }

        .tool-input:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 0 3px rgba(66, 248, 245, 0.2);
            outline: none;
            background: #ffffff;
        }

        .display-field {
            background: #12151a;
            border-radius: 10px;
            padding: 1rem;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid #42f8f5;
            font-family: monospace;
            margin: 0.8rem 0;
        }

        .display-field small {
            display: block;
            color: #b0c4de;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .result-detail {
            display: flex;
            justify-content: space-around;
            margin: 0.8rem 0;
            padding: 0.5rem;
            background: #12151a;
            border-radius: 10px;
            border: 1px solid #42f8f5;
        }

        .detail-item {
            text-align: center;
        }

        .detail-value {
            color: #42f8f5;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .detail-label {
            color: #b0c4de;
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        .quick-select {
            display: flex;
            gap: 6px;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 5px 10px;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 60px;
            text-align: center;
        }

        .quick-btn:hover {
            background: #42f8f5;
            color: #12151a;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 0.8rem 0;
        }

        .tool-btn {
            background: #12151a;
            border: 2px solid #42f8f5;
            border-radius: 30px;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-transform: uppercase;
        }

        .tool-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        .action-btn {
            width: 100%;
            background: #42f8f5;
            color: #12151a;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #42f8f5;
            margin-top: 0.3rem;
        }

        .action-btn:hover {
            background: transparent;
            color: #42f8f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(66, 248, 245, 0.4);
        }

        .home-link {
            display: inline-block;
            margin-top: 1rem;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 6px 20px;
            border: 2px solid #42f8f5;
            border-radius: 30px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
        }

        .footer-email {
            margin-top: 1rem;
            color: #6d8ba0;
            font-size: 0.8rem;
            text-align: center;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        /* ===== MOBILE RESPONSIVE - FIT ONE TOOL VERTICALLY ===== */
        @media screen and (max-height: 700px), (max-width: 500px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }
            
            .tool-container {
                padding: 10px;
                margin: 5px auto;
            }
            
            .tool-header {
                margin-bottom: 8px;
                padding-bottom: 5px;
            }
            
            .tool-header h1 {
                font-size: 1.2rem;
            }
            
            .tool-icon {
                font-size: 1.5rem;
            }
            
            .tool-badge {
                padding: 2px 8px;
                font-size: 0.6rem;
            }
            
            .mobile-hide {
                display: none;  /* Hide description on mobile */
            }
            
            .input-label {
                font-size: 0.7rem;
                margin-bottom: 2px;
            }
            
            .tool-input {
                padding: 6px 10px;
                font-size: 0.75rem;
                margin-bottom: 5px;
            }
            
            .display-field {
                padding: 8px;
                margin: 5px 0;
                font-size: 1.1rem;
            }
            
            .display-field small {
                font-size: 0.65rem;
            }
            
            .result-detail {
                margin: 5px 0;
                padding: 5px;
            }
            
            .detail-value {
                font-size: 1.2rem;
            }
            
            .detail-label {
                font-size: 0.55rem;
            }
            
            .quick-select {
                gap: 4px;
                margin-bottom: 5px;
            }
            
            .quick-btn {
                padding: 4px 6px;
                font-size: 0.6rem;
                min-width: 50px;
            }
            
            .button-grid {
                gap: 5px;
                margin: 5px 0;
            }
            
            .tool-btn {
                padding: 6px;
                font-size: 0.7rem;
            }
            
            .action-btn {
                padding: 8px;
                font-size: 0.8rem;
                margin-top: 3px;
            }
            
            .home-link {
                margin-top: 8px;
                padding: 5px 15px;
                font-size: 0.8rem;
            }
            
            .footer-email {
                margin-top: 8px;
                font-size: 0.7rem;
            }
        }

        /* Extra small devices */
        @media screen and (max-height: 600px) {
            .tool-container {
                padding: 8px;
            }
            
            .tool-header h1 {
                font-size: 1rem;
            }
            
            .tool-icon {
                font-size: 1.3rem;
            }
            
            .display-field {
                font-size: 1rem;
                padding: 6px;
            }
            
            .detail-value {
                font-size: 1rem;
            }
            
            .action-btn {
                padding: 6px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="tool-container">
        <div class="tool-header">
            <span class="tool-icon">📆</span>
            <h1>Date Difference</h1>
            <span class="tool-badge">DAYS</span>
        </div>

        <div class="mobile-hide">
            Calculate the exact difference between two dates.
        </div>

        <div class="quick-select">
            <button class="quick-btn" onclick="setToday('start')">📅 Start</button>
            <button class="quick-btn" onclick="setToday('end')">📅 End</button>
            <button class="quick-btn" onclick="setNextWeek()">Week</button>
            <button class="quick-btn" onclick="setNextMonth()">Month</button>
            <button class="quick-btn" onclick="setNextYear()">Year</button>
        </div>

        <label class="input-label"><i class="fas fa-calendar-alt"></i> Start Date</label>
        <input class="tool-input" id="startDate" type="text" value="15-03-2023" placeholder="DD-MM-YYYY">

        <label class="input-label"><i class="fas fa-calendar-check"></i> End Date</label>
        <input class="tool-input" id="endDate" type="text" value="16-02-2026" placeholder="DD-MM-YYYY">

        <div class="display-field" id="mainResult">
            1070 days
            <small>Total days</small>
        </div>

        <div class="result-detail" id="detailResult">
            <div class="detail-item">
                <div class="detail-value" id="years">2</div>
                <div class="detail-label">YRS</div>
            </div>
            <div class="detail-item">
                <div class="detail-value" id="months">11</div>
                <div class="detail-label">MON</div>
            </div>
            <div class="detail-item">
                <div class="detail-value" id="days">1</div>
                <div class="detail-label">DAY</div>
            </div>
        </div>

        <div class="button-grid">
            <button class="tool-btn" onclick="swapDates()"><i class="fas fa-exchange-alt"></i> Swap</button>
            <button class="tool-btn" onclick="resetToDefault()"><i class="fas fa-undo"></i> Reset</button>
        </div>

        <button class="action-btn" onclick="calculateDifference()">
            <i class="fas fa-calculator"></i> CALCULATE
        </button>

        <div style="text-align: center;">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back
            </a>
        </div>

        <div class="footer-email">
            📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
        </div>
    </div>

    <script>
        function parseDate(dateStr) {
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return new Date(parts[2], parts[1]-1, parts[0]);
            }
            return new Date();
        }

        function formatDate(date) {
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            return `${day}-${month}-${year}`;
        }

        function calculateDifference() {
            const startStr = document.getElementById('startDate').value;
            const endStr = document.getElementById('endDate').value;
            
            const startDate = parseDate(startStr);
            const endDate = parseDate(endStr);
            
            if (isNaN(startDate.getTime()) || isNaN(endDate.getTime())) {
                alert('Invalid date format');
                return;
            }
            
            const diffTime = Math.abs(endDate - startDate);
            const totalDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let years = endDate.getFullYear() - startDate.getFullYear();
            let months = endDate.getMonth() - startDate.getMonth();
            let days = endDate.getDate() - startDate.getDate();
            
            if (days < 0) {
                months--;
                days += new Date(endDate.getFullYear(), endDate.getMonth(), 0).getDate();
            }
            
            if (months < 0) {
                years--;
                months += 12;
            }
            
            document.getElementById('mainResult').innerHTML = `
                ${totalDays.toLocaleString()} days
                <small>Total days</small>
            `;
            
            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = days;
        }

        function swapDates() {
            const start = document.getElementById('startDate');
            const end = document.getElementById('endDate');
            [start.value, end.value] = [end.value, start.value];
            calculateDifference();
        }

        function resetToDefault() {
            document.getElementById('startDate').value = '15-03-2023';
            document.getElementById('endDate').value = '16-02-2026';
            calculateDifference();
        }

        function setToday(target) {
            const today = new Date();
            const formatted = formatDate(today);
            if (target === 'start') {
                document.getElementById('startDate').value = formatted;
            } else {
                document.getElementById('endDate').value = formatted;
            }
            calculateDifference();
        }

        function setNextWeek() {
            const today = new Date();
            today.setDate(today.getDate() + 7);
            document.getElementById('endDate').value = formatDate(today);
            calculateDifference();
        }

        function setNextMonth() {
            const today = new Date();
            today.setMonth(today.getMonth() + 1);
            document.getElementById('endDate').value = formatDate(today);
            calculateDifference();
        }

        function setNextYear() {
            const today = new Date();
            today.setFullYear(today.getFullYear() + 1);
            document.getElementById('endDate').value = formatDate(today);
            calculateDifference();
        }

        document.getElementById('startDate').addEventListener('input', calculateDifference);
        document.getElementById('endDate').addEventListener('input', calculateDifference);

        window.addEventListener('load', calculateDifference);
    </script>
</body>
</html>
