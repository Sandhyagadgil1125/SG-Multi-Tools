<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Word Counter - SG Multi Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E8DE99;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .counter-card {
            background: #1c222d;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            border: 2px solid #42f8f5;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #42f8f5;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #42f8f5;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-icon {
            color: #42f8f5;
            font-size: 1.6rem;
        }

        .card-badge {
            background: #12151a;
            color: #42f8f5;
            padding: 4px 12px;
            border-radius: 25px;
            border: 1px solid #42f8f5;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Sample buttons */
        .samples {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .sample-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 60px;
            text-align: center;
        }

        .sample-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        /* Input Section */
        .input-section {
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #42f8f5;
        }

        .input-label {
            color: #b0c4de;
            font-size: 0.7rem;
            margin-bottom: 4px;
            display: block;
        }

        .input-label i {
            color: #42f8f5;
            margin-right: 4px;
        }

        .tool-textarea {
            width: 100%;
            background: #1e2b37;
            border: 1px solid #42f8f5;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            resize: vertical;
            min-height: 80px;
            max-height: 150px;
        }

        .tool-textarea:focus {
            border-color: #42f8f5;
            box-shadow: 0 0 10px rgba(66, 248, 245, 0.3);
        }

        .tool-textarea::placeholder {
            color: #6d8ba0;
        }

        /* Stats Grid - 3 columns on desktop AND mobile */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .stat-card {
            background: #12151a;
            border-radius: 12px;
            padding: 12px 5px;
            text-align: center;
            border: 1px solid #42f8f5;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.2);
        }

        .stat-value {
            color: #42f8f5;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
            font-family: monospace;
        }

        .stat-label {
            color: #b0c4de;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Detailed Stats - 2 columns on desktop AND mobile */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #12151a;
            border-radius: 10px;
            border: 1px solid #42f8f5;
            transition: all 0.2s ease;
        }

        .detail-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.2);
        }

        .detail-label {
            color: #b0c4de;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .detail-label i {
            color: #42f8f5;
            width: 14px;
        }

        .detail-value {
            color: #42f8f5;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: monospace;
        }

        /* Reading Time - 3 columns on desktop AND mobile */
        .reading-time {
            background: #12151a;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #42f8f5;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .time-item {
            text-align: center;
        }

        .time-value {
            color: #42f8f5;
            font-size: 1rem;
            font-weight: 600;
        }

        .time-label {
            color: #b0c4de;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        /* Button Grid - 2 columns on desktop AND mobile */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .tool-btn {
            background: #12151a;
            border: 1px solid #42f8f5;
            border-radius: 20px;
            padding: 10px 5px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tool-btn:hover {
            background: #42f8f5;
            color: #12151a;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(66, 248, 245, 0.3);
        }

        .tool-btn i {
            margin-right: 3px;
        }

        .tool-btn.primary {
            background: #42f8f5;
            color: #12151a;
            font-weight: 600;
        }

        .tool-btn.primary:hover {
            background: transparent;
            color: #42f8f5;
        }

        /* Action Button */
        .action-btn {
            width: 100%;
            background: #42f8f5;
            color: #12151a;
            border: 2px solid #42f8f5;
            border-radius: 30px;
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 0;
        }

        .action-btn:hover {
            background: transparent;
            color: #42f8f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 248, 245, 0.4);
        }

        .action-btn i {
            margin-right: 5px;
        }

        /* Adsterra Ad Container */
        .ad-container {
            width: 100%;
            margin: 15px 0 10px;
            text-align: center;
            background: #12151a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #42f8f5;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            text-align: center;
        }

        .home-link {
            display: inline-block;
            color: #42f8f5;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 20px;
            border: 2px solid #42f8f5;
            border-radius: 25px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #42f8f5;
            color: #1c222d;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(66, 248, 245, 0.4);
        }

        .footer-email {
            margin: 12px 0 8px;
            color: #6d8ba0;
            font-size: 0.75rem;
        }

        .footer-email a {
            color: #42f8f5;
            text-decoration: none;
        }

        .footer-email a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #6d8ba0;
            font-size: 0.7rem;
        }

        /* ===== MOBILE OPTIMIZATIONS ===== */
        @media screen and (max-width: 500px) {
            body {
                padding: 10px;
            }
            
            .counter-card {
                padding: 15px;
            }
            
            .card-title {
                font-size: 1.1rem;
            }
            
            .card-icon {
                font-size: 1.3rem;
            }
            
            .samples {
                flex-direction: row; /* Keep horizontal scrolling if needed */
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 5px;
                -webkit-overflow-scrolling: touch;
            }
            
            .sample-btn {
                flex: 0 0 auto;
                padding: 8px 12px;
            }
            
            .tool-textarea {
                min-height: 70px;
                font-size: 0.9rem;
                padding: 12px;
            }
            
            /* ALL GRIDS MAINTAIN DESKTOP COLUMN COUNTS */
            .stats-grid {
                grid-template-columns: repeat(3, 1fr); /* 3 columns on mobile */
                gap: 6px;
            }
            
            .details-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
                gap: 6px;
            }
            
            .reading-time {
                grid-template-columns: repeat(3, 1fr); /* 3 columns on mobile */
                gap: 5px;
            }
            
            .button-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
                gap: 8px;
            }
            
            /* Adjust font sizes for mobile */
            .stat-value {
                font-size: 1.2rem;
            }
            
            .stat-label {
                font-size: 0.6rem;
            }
            
            .detail-label {
                font-size: 0.65rem;
            }
            
            .detail-value {
                font-size: 0.7rem;
            }
            
            .time-value {
                font-size: 0.9rem;
            }
            
            .time-label {
                font-size: 0.55rem;
            }
            
            .tool-btn {
                font-size: 0.7rem;
                padding: 8px 3px;
            }
            
            .action-btn {
                font-size: 0.8rem;
                padding: 10px;
            }
        }

        /* Extra small devices */
        @media screen and (max-width: 350px) {
            .stats-grid {
                gap: 4px;
            }
            
            .stat-value {
                font-size: 1rem;
            }
            
            .stat-label {
                font-size: 0.55rem;
            }
            
            .details-grid {
                gap: 4px;
            }
            
            .detail-label {
                font-size: 0.6rem;
            }
            
            .detail-value {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="counter-card">
        <div class="card-header">
            <div class="card-title">
                <span class="card-icon">🔢</span> Word Counter
            </div>
            <div class="card-badge">COUNT</div>
        </div>

        <!-- Sample buttons -->
        <div class="samples">
            <button class="sample-btn" onclick="setSample('lorem')">Lorem Ipsum</button>
            <button class="sample-btn" onclick="setSample('paragraph')">Paragraph</button>
            <button class="sample-btn" onclick="setSample('essay')">Essay</button>
            <button class="sample-btn" onclick="clearText()">Clear</button>
        </div>

        <!-- Input Textarea -->
        <div class="input-section">
            <label class="input-label"><i class="fas fa-pencil-alt"></i> Enter Your Text</label>
            <textarea class="tool-textarea" id="textInput" placeholder="Type or paste your text here...">The quick brown fox jumps over the lazy dog.</textarea>
        </div>

        <!-- Main Stats Grid - 3 columns on all devices -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="wordCount">9</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="charCount">41</div>
                <div class="stat-label">Characters</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="charCountNoSpaces">36</div>
                <div class="stat-label">Chars (no spaces)</div>
            </div>
        </div>

        <!-- Detailed Stats - 2 columns on all devices -->
        <div class="details-grid">
            <div class="detail-item">
                <span class="detail-label"><i class="fas fa-fw fa-paragraph"></i> Sentences</span>
                <span class="detail-value" id="sentenceCount">1</span>
            </div>
            <div class="detail-item">
                <span class="detail-label"><i class="fas fa-fw fa-comma"></i> Paragraphs</span>
                <span class="detail-value" id="paragraphCount">1</span>
            </div>
            <div class="detail-item">
                <span class="detail-label"><i class="fas fa-fw fa-clock"></i> Unique Words</span>
                <span class="detail-value" id="uniqueWords">8</span>
            </div>
            <div class="detail-item">
                <span class="detail-label"><i class="fas fa-fw fa-book-open"></i> Avg Word Length</span>
                <span class="detail-value" id="avgLength">4.6</span>
            </div>
            <div class="detail-item">
                <span class="detail-label"><i class="fas fa-fw fa-long-arrow-alt-right"></i> Longest Word</span>
                <span class="detail-value" id="longestWord">jumps</span>
            </div>
            <div class="detail-item">
                <span class="detail-label"><i class="fas fa-fw fa-volume-up"></i> Syllables</span>
                <span class="detail-value" id="syllableCount">12</span>
            </div>
        </div>

        <!-- Reading Time - 3 columns on all devices -->
        <div class="reading-time">
            <div class="time-item">
                <div class="time-value" id="readingTimeSlow">2s</div>
                <div class="time-label">Slow (100 wpm)</div>
            </div>
            <div class="time-item">
                <div class="time-value" id="readingTimeAvg">1s</div>
                <div class="time-label">Average (200 wpm)</div>
            </div>
            <div class="time-item">
                <div class="time-value" id="readingTimeFast">0.5s</div>
                <div class="time-label">Fast (300 wpm)</div>
            </div>
        </div>

        <!-- Button Grid - 2 columns on all devices -->
        <div class="button-grid">
            <button class="tool-btn primary" onclick="countWords()">
                <i class="fas fa-sync-alt"></i> Count
            </button>
            <button class="tool-btn" onclick="copyText()">
                <i class="fas fa-copy"></i> Copy
            </button>
            <button class="tool-btn" onclick="downloadText()">
                <i class="fas fa-download"></i> Download
            </button>
            <button class="tool-btn" onclick="clearText()">
                <i class="fas fa-eraser"></i> Clear
            </button>
        </div>

        <!-- Action Button -->
        <button class="action-btn" onclick="analyzeText()">
            <i class="fas fa-chart-bar"></i> ANALYZE TEXT
        </button>

        <!-- Adsterra Native Banner Ad -->
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://progressmagnify.com/ea58333732a8a42313578cba2aad5256/invoke.js"></script>
            <div id="container-ea58333732a8a42313578cba2aad5256"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="index.html" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <div class="footer-email">
                📧 <a href="mailto:contact@sgtools.in">contact@sgtools.in</a>
            </div>

            <div class="copyright">
                © 2026 SG Multi Tools. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        function countWords() {
            const text = document.getElementById('textInput').value;
            
            if (!text.trim()) {
                // Reset all stats
                document.getElementById('wordCount').textContent = '0';
                document.getElementById('charCount').textContent = '0';
                document.getElementById('charCountNoSpaces').textContent = '0';
                document.getElementById('sentenceCount').textContent = '0';
                document.getElementById('paragraphCount').textContent = '0';
                document.getElementById('uniqueWords').textContent = '0';
                document.getElementById('avgLength').textContent = '0';
                document.getElementById('longestWord').textContent = '-';
                document.getElementById('syllableCount').textContent = '0';
                document.getElementById('readingTimeSlow').textContent = '0s';
                document.getElementById('readingTimeAvg').textContent = '0s';
                document.getElementById('readingTimeFast').textContent = '0s';
                return;
            }

            // Basic counts
            const words = text.trim().split(/\s+/).filter(word => word.length > 0);
            const wordCount = words.length;
            const charCount = text.length;
            const charCountNoSpaces = text.replace(/\s+/g, '').length;
            
            // Sentences (split by ., !, ?)
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
            const sentenceCount = sentences.length;
            
            // Paragraphs (split by double newline)
            const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            const paragraphCount = paragraphs.length || 1;
            
            // Unique words
            const uniqueWords = new Set(words.map(w => w.toLowerCase())).size;
            
            // Average word length
            const totalWordLength = words.reduce((sum, word) => sum + word.length, 0);
            const avgLength = (totalWordLength / wordCount).toFixed(1);
            
            // Longest word
            const longestWord = words.reduce((longest, current) => 
                current.length > longest.length ? current : longest, '');
            
            // Syllable count (approximate)
            const syllableCount = words.reduce((total, word) => {
                const matches = word.toLowerCase().match(/[aeiou]+/g);
                return total + (matches ? matches.length : 1);
            }, 0);
            
            // Reading time
            const readingTimeSlow = (wordCount / 100 * 60).toFixed(0);
            const readingTimeAvg = (wordCount / 200 * 60).toFixed(0);
            const readingTimeFast = (wordCount / 300 * 60).toFixed(0);

            // Update displays
            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('charCountNoSpaces').textContent = charCountNoSpaces;
            document.getElementById('sentenceCount').textContent = sentenceCount;
            document.getElementById('paragraphCount').textContent = paragraphCount;
            document.getElementById('uniqueWords').textContent = uniqueWords;
            document.getElementById('avgLength').textContent = avgLength;
            document.getElementById('longestWord').textContent = longestWord || '-';
            document.getElementById('syllableCount').textContent = syllableCount;
            
            document.getElementById('readingTimeSlow').textContent = readingTimeSlow + 's';
            document.getElementById('readingTimeAvg').textContent = readingTimeAvg + 's';
            document.getElementById('readingTimeFast').textContent = readingTimeFast + 's';
        }

        function setSample(type) {
            const samples = {
                lorem: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.",
                paragraph: "Word counter tools are essential for writers, students, and professionals. They help you keep track of your writing progress and meet specific requirements. Whether you're writing an essay, a blog post, or a social media update, knowing your word count is crucial.",
                essay: "The Importance of Regular Exercise\n\nRegular physical activity is one of the most important things you can do for your health. Being physically active can improve your brain health, help manage weight, reduce the risk of disease, strengthen bones and muscles, and improve your ability to do everyday activities.\n\nAdults who sit less and do any amount of moderate-to-vigorous physical activity gain some health benefits. For substantial health benefits, adults should do at least 150 minutes of moderate-intensity aerobic activity weekly."
            };
            
            if (type === 'clear') {
                document.getElementById('textInput').value = '';
            } else {
                document.getElementById('textInput').value = samples[type];
            }
            
            countWords();
        }

        function copyText() {
            const text = document.getElementById('textInput').value;
            if (!text) {
                alert('No text to copy');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Text copied to clipboard!');
            }).catch(() => {
                alert('Press Ctrl+C to copy');
            });
        }

        function downloadText() {
            const text = document.getElementById('textInput').value;
            if (!text) {
                alert('No text to download');
                return;
            }
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `word-counter-${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearText() {
            if (document.getElementById('textInput').value) {
                if (confirm('Clear all text?')) {
                    document.getElementById('textInput').value = '';
                    countWords();
                }
            }
        }

        function analyzeText() {
            const text = document.getElementById('textInput').value;
            if (!text) {
                alert('No text to analyze');
                return;
            }
            
            // Simulate analysis
            alert('Text analysis complete!\n\n' +
                  '✅ Readability: Good\n' +
                  '✅ Grade Level: 8th grade\n' +
                  '✅ Complexity: Medium\n' +
                  '✅ Sentiment: Neutral');
        }

        // Auto-count on input
        document.getElementById('textInput').addEventListener('input', countWords);

        // Initial count
        window.addEventListener('load', countWords);
    </script>
</body>
</html>
